<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AliExpress Style Fulfillment ERP - PRO</title>
<style>
:root{--ali-red:#FD384F;--ali-orange:#FF6A00;--bg-gray:#F4F4F4;--text-main:#191919;--text-sub:#666;--border-color:#EAEAEA;--choice-yellow:#FFF5CC}
*{box-sizing:border-box;margin:0;padding:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;font-size:12px}
body{background:var(--bg-gray);color:var(--text-main);max-width:440px;margin:0 auto;min-height:100vh;position:relative;box-shadow:0 0 20px rgba(0,0,0,0.1);padding-bottom:65px}

/* ヘッダー */
header{background:#FFF;padding:8px 12px;position:sticky;top:0;z-index:90;border-bottom:1px solid var(--border-color)}
.hdr-top{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.back-arrow{font-size:16px;cursor:pointer;padding-right:4px}
.search-container{flex:1;display:flex;align-items:center;background:#F5F5F5;border-radius:20px;padding:6px 12px}
.search-input{border:none;background:none;outline:none;width:100%;font-size:12px;color:#333}

/* 注文状態タブ */
.order-tabs{display:flex;background:#FFF;border-bottom:1px solid var(--border-color);overflow-x:auto}
.o-tab{padding:10px 14px;color:var(--text-sub);cursor:pointer;white-space:nowrap;font-weight:bold;position:relative}
.o-tab.active{color:var(--text-main);font-size:13px}
.o-tab.active::after{content:'';position:absolute;bottom:0;left:15%;width:70%;height:3px;background:var(--text-main);border-radius:2px}

.container{padding:0}
.tab-content{display:none}
.tab-content.active{display:block}

/* カタログ用グリッド */
.p-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;padding:8px}
.p-card{background:#FFF;border-radius:10px;padding:8px;display:flex;flex-direction:column;justify-content:space-between;border:1px solid #EEE}
.img-box{background:#F8F8F8;height:120px;border-radius:6px;display:flex;justify-content:center;align-items:center;font-size:48px;position:relative}
.choice-badge{position:absolute;top:4px;left:4px;background:#FFD600;color:#000;font-weight:900;font-size:9px;padding:2px 5px;border-radius:4px}
.price-line{color:var(--ali-red);font-size:15px;font-weight:900;margin-top:6px}
.btn-add-cart{background:#FFF;border:1px solid var(--ali-red);color:var(--ali-red);border-radius:15px;padding:6px;font-weight:bold;cursor:pointer;width:100%;margin-top:6px;transition:all 0.2s}
.btn-add-cart:active{background:var(--ali-red);color:#FFF}

/* ==========================================
   🛒 注文確認（カート）画面専用デザイン（完全再現）
========================================== */
.checkout-header{background:#FFF;padding:12px;display:flex;align-items:center;gap:10px;font-size:16px;font-weight:bold;border-bottom:1px solid #EEE}
.checkout-header .secure{color:#4CAF50;font-size:10px;display:flex;align-items:center;gap:4px;margin-top:2px}
.checkout-section{background:#FFF;margin-bottom:8px;padding:14px}
.mail-border{height:4px;background:repeating-linear-gradient(to right, #E53935 0, #E53935 12px, transparent 12px, transparent 16px, #1E88E5 16px, #1E88E5 28px, transparent 28px, transparent 32px);margin:10px -14px -14px -14px}
.addr-title{font-weight:bold;margin-bottom:8px}
.addr-name{font-weight:bold;font-size:13px;margin-bottom:4px}
.addr-desc{color:#666;font-size:11px;line-height:1.4}
.store-bar{display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid #EEE;padding-bottom:10px;margin-bottom:10px}
.co-prod-row{display:flex;gap:12px;margin-bottom:14px}
.co-img{width:64px;height:64px;background:#F5F5F5;border-radius:6px;display:flex;justify-content:center;align-items:center;font-size:32px;border:1px solid #EEE}
.qty-ctrl{display:inline-flex;align-items:center;border:1px solid #DDD;border-radius:15px;overflow:hidden;margin-top:6px}
.qty-btn{background:#FFF;border:none;padding:2px 10px;font-size:16px;cursor:pointer;color:#555}
.qty-val{padding:0 12px;font-weight:bold;font-size:13px;border-left:1px solid #DDD;border-right:1px solid #DDD}
.shipping-info{border-top:1px dashed #EEE;padding-top:10px;font-size:11px;color:#555;line-height:1.6}
.pay-method-row{display:flex;align-items:center;gap:10px;padding:12px 0;border-bottom:1px solid #F5F5F5}
.pay-method-row:last-child{border-bottom:none}
.radio-circle{width:18px;height:18px;border:1px solid #CCC;border-radius:50%;display:flex;justify-content:center;align-items:center}
.radio-circle.selected{border-color:var(--ali-red);background:var(--ali-red)}
.radio-circle.selected::after{content:'';width:6px;height:6px;background:#FFF;border-radius:50%}

.checkout-footer{position:fixed;bottom:55px;left:50%;transform:translateX(-50%);width:100%;max-width:440px;background:#FFF;border-top:1px solid #EEE;padding:10px 14px;display:flex;justify-content:space-between;align-items:center;z-index:95}
.btn-pay-now{background:var(--ali-red);color:#FFF;border:none;border-radius:20px;padding:10px 24px;font-size:14px;font-weight:bold;cursor:pointer}

/* 📦 アリエク風 注文＆追跡カード */
.alie-card{background:#FFF;border-radius:12px;padding:12px;margin:8px;box-shadow:0 1px 4px rgba(0,0,0,0.04)}
.store-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
.store-choice{background:var(--choice-yellow);color:#996600;font-weight:bold;padding:1px 4px;border-radius:3px;font-size:9px;margin-right:4px}
.prod-row{display:flex;gap:10px;margin-bottom:10px}
.prod-img{width:60px;height:60px;background:#F5F5F5;border-radius:6px;display:flex;justify-content:center;align-items:center;font-size:28px}
.prod-title{height:28px;overflow:hidden;font-weight:500;line-height:1.3;font-size:11px}
.status-alert-box{background:#F9F9F9;border-radius:8px;padding:8px 10px;margin-bottom:10px;display:flex;flex-direction:column;gap:4px;border:1px solid #EEE}
.status-alert-box.alert-waiting{background:#FFFDE7;border-color:#FFF59D} /* 支払い待ち用カラー */
.status-alert-box.alert-ready{background:#E8F5E9;border-color:#C8E6C9}
.card-actions{display:flex;justify-content:flex-end;gap:8px;border-top:1px solid #F5F5F5;padding-top:8px}
.btn-outline{background:#FFF;border:1px solid #CCC;color:#333;padding:5px 12px;border-radius:15px;cursor:pointer;font-weight:bold}
.btn-outline.primary{border-color:var(--text-main);color:var(--text-main)}

/* ボトムナビ */
.bottom-nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:440px;background:#FFF;border-top:1px solid var(--border-color);display:flex;justify-content:space-around;padding:6px 0;z-index:100}
.nav-item{background:none;border:none;color:#666;display:flex;flex-direction:column;align-items:center;flex:1;cursor:pointer;font-weight:bold;font-size:10px;position:relative}
.nav-item.active{color:var(--ali-red)}
.cart-badge{position:absolute;top:-2px;right:18px;background:var(--ali-red);color:#FFF;font-size:9px;width:14px;height:14px;border-radius:50%;display:flex;justify-content:center;align-items:center}

/* カスタマーチャット */
.chat-window{background:#FFF;height:calc(100vh - 120px);display:flex;flex-direction:column}
.chat-messages{flex:1;padding:10px;overflow-y:auto;background:#F4F4F4;display:flex;flex-direction:column;gap:8px}
.bubble{max-width:85%;padding:8px 10px;border-radius:10px;line-height:1.4}
.bubble.bot{background:#FFF;align-self:flex-start}
.bubble.user{background:var(--ali-red);color:#FFF;align-self:flex-end}
.chat-input-row{padding:6px;background:#FFF;border-top:1px solid #EEE;display:flex;gap:6px}

#success-pop{display:none;position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);background:rgba(0,0,0,0.8);color:#FFF;padding:12px 20px;border-radius:20px;z-index:300;text-align:center;font-weight:bold}
</style>
</head>
<body>

<div id="success-pop">カートに追加しました</div>

<!-- ヘッダー（ショップ・追跡用） -->
<header id="main-header">
  <div class="hdr-top">
    <span class="back-arrow">❮</span>
    <div class="search-container">
      <input type="text" id="search-box" class="search-input" placeholder="注文ID、商品名、またはキーワード..." oninput="renderCatalog()">
    </div>
  </div>
  <div class="order-tabs" id="track-tabs" style="display:none;">
    <div class="o-tab" id="tab-wait-pay" onclick="filterOrders('支払い待ち')">支払い待ち</div>
    <div class="o-tab" id="tab-process" onclick="filterOrders('処理中')">処理中</div>
    <div class="o-tab" id="tab-done" onclick="filterOrders('処理済み')">処理済み</div>
  </div>
</header>

<div class="container">
  
  <!-- 1. カタログ画面 -->
  <div id="sec-shop" class="tab-content active">
    <div id="catalog-grid" class="p-grid">
      <div style="text-align:center;padding:20px;grid-column:span 2;">商品を読み込み中...</div>
    </div>
  </div>

  <!-- 2. 注文確認（カート）画面 -->
  <div id="sec-cart" class="tab-content" style="padding-bottom: 60px;">
    <div class="checkout-header">
      <span class="back-arrow" onclick="switchTab('shop')">❮</span> 
      <div>
        <div>注文確認</div>
        <div class="secure">✔ 紛失補償</div>
      </div>
    </div>
    
    <div id="cart-empty" style="text-align:center;padding:40px;color:#999;font-weight:bold;">カートに商品がありません。</div>

    <div id="cart-content" style="display:none;">
      <!-- 配送先 -->
      <div class="checkout-section">
        <div class="addr-title">配送先住所</div>
        <div class="addr-name">しゃーる かん (シャミール かん) +81 08053536387</div>
        <div class="addr-desc">西町, 12-22 ダイヤモンドマンション613<br>横浜市 磯子区, 神奈川県, Japan, 2350007</div>
        <div class="mail-border"></div>
      </div>

      <!-- 商品リスト -->
      <div class="checkout-section" id="checkout-items"></div>

      <!-- 支払い方法 -->
      <div class="checkout-section">
        <div style="font-weight:bold;font-size:14px;margin-bottom:8px;display:flex;justify-content:space-between;">
          支払い方法 <span style="font-size:11px;color:#999;cursor:pointer;">もっと見る ></span>
        </div>
        <div class="pay-method-row" onclick="selectPay('PayPay')">
          <div class="radio-circle selected" id="rad-paypal"></div>
          <span style="font-size:18px;color:#003087;font-weight:900;font-style:italic;">PayPal</span>
        </div>
        <div class="pay-method-row" onclick="selectPay('card')">
          <div class="radio-circle" id="rad-card"></div>
          <span style="font-weight:bold;">代引き</span>
        </div>
        <div class="pay-method-row" onclick="selectPay('conbini')">
          <div class="radio-circle" id="rad-conbini"></div>
          <span style="font-weight:bold;">現金送金</span>
        </div>
      </div>

      <!-- プロモコード -->
      <div class="checkout-section" style="display:flex;justify-content:space-between;font-weight:bold;">
        プロモコード <span>></span>
      </div>

      <!-- 下部固定バー -->
      <div class="checkout-footer">
        <div style="font-weight:bold;font-size:14px;">合計: <span id="co-total-price">0円</span></div>
        <button class="btn-pay-now" onclick="executePayment()">今支払います</button>
      </div>
    </div>
  </div>

  <!-- 3. アリエク風 配送追跡センター -->
  <div id="sec-track" class="tab-content">
    <div id="empty-notice" style="text-align:center;padding:40px;color:#999;font-weight:bold;">該当する注文はありません。</div>
    <div id="orders-list-container"></div>
  </div>

  <!-- 4. カスタマーサポートチャット -->
  <div id="sec-chat" class="tab-content">
    <div class="chat-window">
      <div style="padding:8px;background:#F9F9F9;border-bottom:1px solid #EEE;">
        <span style="font-weight:bold;">対象の注文:</span>
        <select id="chat-target-code" style="width:100%;padding:4px;margin-top:4px;border:1px solid #CCC;border-radius:4px;">
          <option value="">-- 選択してください --</option>
        </select>
      </div>
      <div id="chat-box" class="chat-messages">
        <div class="bubble bot">🤖 チャットサポートへようこそ！支払い待ちの入金確認や、追跡の催促など何でもお申し付けください！</div>
      </div>
      <div class="chat-input-row">
        <input type="text" id="chat-input" style="flex:1;padding:8px 12px;border:1px solid #DDD;border-radius:15px;outline:none;" placeholder="メッセージを入力..." onkeypress="if(event.key==='Enter')sendChat()">
        <button class="btn-outline primary" style="border-radius:15px;" onclick="sendChat()">送信</button>
      </div>
    </div>
  </div>
</div>

<!-- ボトムナビ -->
<div class="bottom-nav">
  <button id="nav-item-shop" class="nav-item active" onclick="switchTab('shop')"><span style="font-size:18px;">🏠</span>カタログ</button>
  <button id="nav-item-track" class="nav-item" onclick="switchTab('track')"><span style="font-size:18px;">📦</span>注文・追跡</button>
  <button id="nav-item-chat" class="nav-item" onclick="switchTab('chat')"><span style="font-size:18px;">💬</span>チャット</button>
  <button id="nav-item-cart" class="nav-item" onclick="switchTab('cart')">
    <span style="font-size:18px;">🛒</span>カート
    <div id="cart-badge" class="cart-badge" style="display:none;">0</div>
  </button>
</div>

<script>
const SHEET_PROD_URL = "https://docs.google.com/spreadsheets/d/1LK09yYcLi63EW9-xhXIENfszwyFLC4Jmz_-tO69ab94/export?format=csv&gid=0";
const SHEET_TRACK_URL = "https://docs.google.com/spreadsheets/d/178-dcD4xd0fUdEORnoC9haQrKmfGiKTaY0OxiOKBRrQ/export?format=csv&gid=0";
const FORMSPREE_URL = "https://formspree.io/f/xrenqbpg";
const SHIPPING_FEE = 300;

let catalogList = [];
let cart = [];
let orders = [];
let trackingPool = [];
let bgSyncInterval = null;
let currentTrackFilter = '支払い待ち';
let selectedPay = 'paypal';

async function initApp() {
  await loadCatalog();
  renderCatalog();
  setupBgSync();
}

// 📦 スプレッドシートから商品取得復活！
async function loadCatalog() {
  try {
    const res = await fetch(SHEET_PROD_URL);
    const text = await res.text();
    const rows = text.split('\n').slice(1);
    catalogList = rows.map((row, i) => {
      if (!row.trim()) return null;
      const cols = row.split(',').map(c => c.replace(/^"(.*)"$/, '$1').trim());
      return {
        id: i + 1,
        wh: cols[0] ? cols[0].toUpperCase() : "CHINA",
        name: cols[1] || "商品名未設定",
        price: parseInt(cols[2]) || 0,
        icon: cols[4] || "🎁",
        store: "Choice AliExpress Store"
      };
    }).filter(Boolean);
  } catch(e) {
    // 取得失敗時のフォールバック
    catalogList = [
      { id: 1, name: "ターボハンドヘルド小型ファン USB 充電", price: 395, icon: "🌀", store: "Choice AliExpress Store", wh:"CHINA" },
      { id: 2, name: "Extreme PRO SDカード 512GB", price: 857, icon: "💾", store: "Choice AliExpress Store", wh:"CHINA" }
    ];
  }
}

function renderCatalog() {
  const grid = document.getElementById('catalog-grid');
  grid.innerHTML = "";
  const q = document.getElementById('search-box').value.toLowerCase();
  
  catalogList.forEach(p => {
    if(q && !p.name.toLowerCase().includes(q)) return;
    grid.innerHTML += `
      <div class="p-card">
        <div class="img-box"><span class="choice-badge">Choice</span>${p.icon}</div>
        <div style="font-weight:500;margin-top:6px;height:34px;overflow:hidden;line-height:1.2;">${p.name}</div>
        <div class="price-line">¥${p.price.toLocaleString()}</div>
        <button class="btn-add-cart" onclick="addToCart(${p.id})">カートに追加</button>
      </div>
    `;
  });
}

function addToCart(id) {
  const p = catalogList.find(x => x.id === id);
  const existing = cart.find(x => x.id === id);
  if(existing) {
    existing.qty++;
  } else {
    cart.push({...p, qty: 1, cartId: new Date().getTime()});
  }
  updateCartBadge();
  const pop = document.getElementById('success-pop');
  pop.style.display = 'block';
  setTimeout(() => pop.style.display='none', 1000);
}

function updateCartBadge() {
  const badge = document.getElementById('cart-badge');
  const totalQty = cart.reduce((s, i) => s + i.qty, 0);
  if(totalQty > 0) {
    badge.style.display = 'flex';
    badge.innerText = totalQty;
  } else {
    badge.style.display = 'none';
  }
}

function changeQty(cartId, delta) {
  const item = cart.find(x => x.cartId === cartId);
  if(!item) return;
  item.qty += delta;
  if(item.qty <= 0) cart = cart.filter(x => x.cartId !== cartId);
  updateCartBadge();
  renderCart();
}

function renderCart() {
  const empty = document.getElementById('cart-empty');
  const content = document.getElementById('cart-content');
  if(cart.length === 0) {
    empty.style.display = 'block';
    content.style.display = 'none';
    return;
  }
  empty.style.display = 'none';
  content.style.display = 'block';

  let html = "";
  let subtotal = 0;
  cart.forEach(item => {
    subtotal += item.price * item.qty;
    html += `
      <div class="store-bar">
        <div><span class="choice-badge" style="position:static;font-size:10px;">Choice</span> <strong>AliExpressで配送</strong></div>
        <div style="color:#666;font-size:11px;">表示する(1) ></div>
      </div>
      <div class="co-prod-row">
        <div class="co-img">${item.icon}</div>
        <div style="flex:1;">
          <div style="font-weight:500;margin-bottom:4px;height:16px;overflow:hidden;">${item.name}</div>
          <div style="font-weight:900;font-size:14px;margin-bottom:4px;">${item.price}円</div>
          <div class="qty-ctrl">
            <button class="qty-btn" onclick="changeQty(${item.cartId}, -1)">-</button>
            <div class="qty-val">${item.qty}</div>
            <button class="qty-btn" onclick="changeQty(${item.cartId}, 1)">+</button>
          </div>
        </div>
      </div>
      <div class="shipping-info">
        <strong style="font-size:12px;color:#333;">発送 : ${SHIPPING_FEE}円</strong><br>
        配達: 7月 27 - 8月 03<br>
        Courier company: 🐈‍⬛ ヤマト運輸 🟦 佐川急便 📮 Japan Post, etc.
      </div>
      <div style="height:10px;background:#F5F5F5;margin:10px -14px 0 -14px;"></div>
    `;
  });
  
  document.getElementById('checkout-items').innerHTML = html;
  const total = subtotal + SHIPPING_FEE;
  document.getElementById('co-total-price').innerText = `${total.toLocaleString()}円`;
}

function selectPay(type) {
  selectedPay = type;
  document.getElementById('rad-paypal').className = type === 'paypal' ? 'radio-circle selected' : 'radio-circle';
  document.getElementById('rad-card').className = type === 'card' ? 'radio-circle selected' : 'radio-circle';
  document.getElementById('rad-conbini').className = type === 'conbini' ? 'radio-circle selected' : 'radio-circle';
}

async function executePayment() {
  if(cart.length === 0) return;
  const total = cart.reduce((s, i) => s + (i.price * i.qty), 0) + SHIPPING_FEE;
  const itemNames = cart.map(i => `${i.name}x${i.qty}`).join(", ");
  
  // D欄連動！最初は「支払い待ち」でスタート
  const newOrd = {
    id: "AX-" + new Date().getTime(),
    tn: "発番待機中", // 番号はシート同期時に付与
    itemsStr: itemNames,
    total: total,
    step: 0,
    // 超重要：「支払い待ち」フラグ
    paymentStatus: 'waiting', 
    prefixType: cart[0].wh === "JAPAN" ? "JP" : "LP"
  };
  
  orders.push(newOrd);
  
  try {
    await fetch(FORMSPREE_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ note: "新規注文発生(支払い待ち)", items: itemNames, total: total })
    });
  } catch(e){}

  cart = [];
  updateCartBadge();
  const pop = document.getElementById('success-pop');
  pop.innerText = "注文を受け付けました！";
  pop.style.display = 'block';
  setTimeout(() => { 
    pop.style.display='none'; 
    switchTab('track');
    filterOrders('支払い待ち'); // 支払い待ちタブへ遷移
  }, 1500);
}

/* =======================================
   D欄（cols[3]）連動バックグラウンド同期
======================================= */
async function fetchTrackingState() {
  try {
    const res = await fetch(SHEET_TRACK_URL + "&t=" + new Date().getTime());
    const text = await res.text();
    trackingPool = text.split('\n').slice(1).map(row => {
      if (!row.trim()) return null;
      const cols = row.split(',').map(c => c.replace(/^"(.*)"$/, '$1').trim());
      return { 
        code: cols[0], 
        stepStr: cols[1] || "", 
        step: parseInt(cols[1]) || 0, 
        memo: cols[2] || "",
        // D欄(4列目)を取得
        colD: cols[3] || "" 
      };
    }).filter(Boolean);
  } catch(e) {}
}

function setupBgSync() {
  if(bgSyncInterval) clearInterval(bgSyncInterval);
  bgSyncInterval = setInterval(async () => {
    await fetchTrackingState();
    let updated = false;

    orders.forEach(ord => {
      // 1. 番号がない場合は空き枠を探す
      if(ord.tn === "発番待機中") {
        let freeObj = trackingPool.find(p => p.stepStr === "" && p.code.startsWith(ord.prefixType) && !orders.some(o => o.tn === p.code));
        if(freeObj) {
          ord.tn = freeObj.code;
          updated = true;
        }
      }

      // 2. 番号がある場合、シートの状態を同期
      if(ord.tn !== "発番待機中") {
        let match = trackingPool.find(p => p.code === ord.tn);
        if(match) {
          // D欄に「支払い待ち」と書いてあれば待機キープ。
          // 空欄や他の文字になれば支払い完了として処理中へ移行！
          if(match.colD.includes("支払い待ち")) {
            if(ord.paymentStatus !== 'waiting') {
              ord.paymentStatus = 'waiting';
              updated = true;
            }
          } else {
            if(ord.paymentStatus === 'waiting') {
              ord.paymentStatus = 'paid';
              updated = true;
            }
            // ステップ同期
            if(match.stepStr !== "" && match.step !== ord.step) {
              ord.step = Math.min(10, match.step);
              updated = true;
            }
          }
        }
      }
    });

    if(updated) {
      if(document.getElementById('sec-track').classList.contains('active')) renderOrders();
      updateChatDropdown();
    }
  }, 2000);
}

function filterOrders(status) {
  currentTrackFilter = status;
  document.querySelectorAll('.o-tab').forEach(t => t.classList.remove('active'));
  
  if(status === '支払い待ち') document.getElementById('tab-wait-pay').classList.add('active');
  if(status === '処理中') document.getElementById('tab-process').classList.add('active');
  if(status === '処理済み') document.getElementById('tab-done').classList.add('active');
  
  renderOrders();
}

function renderOrders() {
  const container = document.getElementById('orders-list-container');
  container.innerHTML = "";
  
  // フィルタリングロジック
  let filtered = orders.filter(o => {
    if(currentTrackFilter === '支払い待ち') return o.paymentStatus === 'waiting';
    if(currentTrackFilter === '処理中') return o.paymentStatus === 'paid' && o.step < 10;
    if(currentTrackFilter === '処理済み') return o.paymentStatus === 'paid' && o.step >= 10;
    return false;
  });

  if(filtered.length === 0) {
    document.getElementById('empty-notice').style.display = 'block';
    return;
  }
  document.getElementById('empty-notice').style.display = 'none';

  filtered.forEach(ord => {
    let alertHtml = "";
    let btnHtml = "";
    
    if(ord.paymentStatus === 'waiting') {
      alertHtml = `
        <div class="status-alert-box alert-waiting">
          <div style="font-weight:bold;color:#F57F17;">⏳ お支払いの確認をお待ちしています</div>
          <div style="color:#666;font-size:11px;">※管理者がスプレッドシートのD欄を更新すると「処理中」へ移行します。</div>
        </div>`;
      btnHtml = `<button class="btn-outline primary">支払い方法を変更</button>`;
    } else if(ord.step >= 10) {
      alertHtml = `<div class="status-alert-box alert-ready"><div style="font-weight:bold;color:#2E7D32;">✨ 配達完了</div></div>`;
      btnHtml = `<button class="btn-outline">受取確認</button>`;
    } else {
      alertHtml = `
        <div class="status-alert-box alert-ready">
          <div style="font-weight:bold;color:#1976D2;">🚚 処理中・追跡可能</div>
          <div style="font-size:11px;">追跡番号: ${ord.tn}</div>
        </div>`;
      btnHtml = `<button class="btn-outline primary">ステータスを追跡する</button>`;
    }

    container.innerHTML += `
      <div class="alie-card">
        <div class="store-header">
          <div><span class="store-choice">Choice</span><span style="font-weight:bold;font-size:11px;">AliExpress Store ❯</span></div>
        </div>
        <div class="prod-row">
          <div class="prod-img">📦</div>
          <div style="flex:1">
            <div class="prod-title">${ord.itemsStr}</div>
            <div style="font-weight:bold;font-size:13px;margin-top:4px;">¥${ord.total.toLocaleString()}</div>
          </div>
        </div>
        ${alertHtml}
        <div class="card-actions">${btnHtml}</div>
      </div>
    `;
  });
}

function updateChatDropdown() {
  const select = document.getElementById('chat-target-code');
  select.innerHTML = '<option value="">-- 選択してください --</option>';
  orders.forEach(o => {
    let stat = o.paymentStatus === 'waiting' ? "(支払い待ち)" : `(${o.tn})`;
    select.innerHTML += `<option value="${o.id}">${o.itemsStr.substring(0,10)}... ${stat}</option>`;
  });
}

function appendChat(text, sender) {
  const box = document.getElementById('chat-box');
  const b = document.createElement('div');
  b.className = `bubble ${sender}`;
  b.innerHTML = text;
  box.appendChild(b);
  box.scrollTop = box.scrollHeight;
}

function sendChat() {
  const inp = document.getElementById('chat-input');
  const txt = inp.value.trim();
  if(!txt) return;
  appendChat(txt, 'user');
  inp.value = "";
  
  setTimeout(() => {
    appendChat(`🤖 ご連絡ありがとうございます。システムとスプレッドシートへの連携を確認いたします。`, 'bot');
  }, 600);
}

function switchTab(tab) {
  document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
  document.querySelectorAll('.nav-item').forEach(b => b.classList.remove('active'));
  document.getElementById('main-header').style.display = 'block';
  document.getElementById('track-tabs').style.display = 'none';

  if(tab === 'shop') {
    document.getElementById('sec-shop').classList.add('active');
    document.getElementById('nav-item-shop').classList.add('active');
  } else if(tab === 'cart') {
    document.getElementById('sec-cart').classList.add('active');
    document.getElementById('nav-item-cart').classList.add('active');
    document.getElementById('main-header').style.display = 'none'; // カートは専用ヘッダー
    renderCart();
  } else if(tab === 'track') {
    document.getElementById('sec-track').classList.add('active');
    document.getElementById('nav-item-track').classList.add('active');
    document.getElementById('track-tabs').style.display = 'flex';
    filterOrders(currentTrackFilter);
  } else if(tab === 'chat') {
    document.getElementById('sec-chat').classList.add('active');
    document.getElementById('nav-item-chat').classList.add('active');
  }
}

initApp();
</script>
