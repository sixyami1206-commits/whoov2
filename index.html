<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AliExpress Style Fulfillment ERP</title>
<style>
:root{--ali-red:#FD384F;--ali-orange:#FF6A00;--bg-gray:#F4F4F4;--text-main:#191919;--text-sub:#666;--border-color:#EAEAEA;--choice-yellow:#FFF5CC}
*{box-sizing:border-box;margin:0;padding:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;font-size:11px}
body{background:var(--bg-gray);color:var(--text-main);max-width:440px;margin:0 auto;min-height:100vh;position:relative;box-shadow:0 0 20px rgba(0,0,0,0.1);padding-bottom:65px}

/* アリエク風ヘッダー */
header{background:#FFF;padding:8px 12px;position:sticky;top:0;z-index:90;border-bottom:1px solid var(--border-color)}
.hdr-top{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.back-arrow{font-size:16px;cursor:pointer;padding-right:4px}
.search-container{flex:1;display:flex;align-items:center;background:#F5F5F5;border-radius:20px;padding:4px 12px}
.search-input{border:none;background:none;outline:none;width:100%;font-size:11px;color:#333}
.hdr-icons{display:flex;gap:12px;font-size:14px;color:#333}

/* 注文状態タブ */
.order-tabs{display:flex;background:#FFF;border-bottom:1px solid var(--border-color);overflow-x:auto}
.o-tab{padding:10px 14px;color:var(--text-sub);cursor:pointer;white-space:nowrap;font-weight:bold;position:relative}
.o-tab.active{color:var(--text-main);font-size:12px}
.o-tab.active::after{content:'';position:absolute;bottom:0;left:15%;width:70%;height:3px;background:var(--text-main);border-radius:2px}

.container{padding:8px}
.tab-content{display:none}
.tab-content.active{display:block}

/* カタログ用グリッド */
.p-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px}
.p-card{background:#FFF;border-radius:10px;padding:8px;display:flex;flex-direction:column;justify-content:between;border:1px solid #EEE}
.img-box{background:#F8F8F8;height:100px;border-radius:6px;display:flex;justify-content:center;align-items:center;font-size:36px;position:relative}
.choice-badge{position:absolute;top:4px;left:4px;background:#FFD600;color:#000;font-weight:900;font-size:8px;padding:1px 4px;border-radius:3px}
.price-line{color:var(--ali-red);font-size:13px;font-weight:900;margin-top:4px}
.btn-buy{background:linear-gradient(90deg,#FF8A00,#FF384F);color:#FFF;border:none;border-radius:15px;padding:6px;font-weight:bold;cursor:pointer;width:100%;margin-top:4px}

/* アリエク風 注文＆追跡カード */
.alie-card{background:#FFF;border-radius:12px;padding:12px;margin-bottom:10px;box-shadow:0 1px 4px rgba(0,0,0,0.04)}
.store-header{display:flex;justify-content:between;align-items:center;margin-bottom:8px}
.store-choice{background:var(--choice-yellow);color:#996600;font-weight:bold;padding:1px 4px;border-radius:3px;font-size:8px;margin-right:4px}
.store-name{font-weight:bold;color:#333}
.prod-row{display:flex;gap:10px;margin-bottom:10px}
.prod-img{width:60px;height:60px;background:#F5F5F5;border-radius:6px;display:flex;justify-content:center;align-items:center;font-size:28px}
.prod-details{flex:1;display:flex;flex-direction:column;justify-content:space-between}
.prod-title{height:28px;overflow:hidden;font-weight:500;line-height:1.3}
.prod-price-row{display:flex;justify-content:space-between;align-items:baseline}

/* 動的アラートエリア（指定文言エリア） */
.status-alert-box{background:#F9F9F9;border-radius:8px;padding:8px 10px;margin-bottom:10px;display:flex;align-items:start;gap:6px;border:1px solid #EEE}
.status-alert-box.alert-waiting{background:#FFF5F5;border-color:#FFEBEE}
.status-alert-box.alert-ready{background:#E8F5E9;border-color:#C8E6C9}

.card-actions{display:flex;justify-content:flex-end;gap:8px;border-top:1px solid #F5F5F5;padding-top:8px}
.btn-secondary{background:#FFF;border:1px solid #CCC;color:#333;padding:5px 12px;border-radius:15px;cursor:pointer;font-weight:bold}
.btn-primary-outline{background:#FFF;border:1px solid var(--text-main);color:var(--text-main);padding:5px 12px;border-radius:15px;cursor:pointer;font-weight:bold}
.btn-disabled{background:#F0F0F0;border:1px solid #DDD;color:#AAA;padding:5px 12px;border-radius:15px;cursor:not-allowed}

/* アリエク風配送タイムラインモーダル */
.modal-overlay{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.5);z-index:200;justify-content:center;align-items:end}
.modal-sheet{background:#FFF;width:100%;max-width:440px;border-top-left-radius:16px;border-top-right-radius:16px;padding:16px;max-height:80vh;overflow-y:auto}
.modal-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;border-bottom:1px solid #EEE;padding-bottom:8px}
.timeline-container{position:relative;padding-left:20px;margin-top:10px}
.timeline-container::before{content:'';position:absolute;top:4px;left:4px;bottom:4px;width:2px;background:#E0E0E0}
.timeline-node{position:relative;margin-bottom:15px}
.timeline-dot{position:absolute;top:2px;left:-20px;width:10px;height:10px;background:#CCC;border-radius:50%}
.timeline-node.active .timeline-dot{background:#4CAF50;box-shadow:0 0 0 3px #E8F5E9}
.timeline-node.active .node-title{color:#4CAF50;font-weight:bold}

/* カスタマーチャット画面 */
.chat-window{background:#FFF;border-radius:12px;border:1px solid var(--border-color);height:400px;display:flex;flex-direction:column;overflow:hidden}
.chat-top-bar{background:#F9F9F9;padding:8px;border-bottom:1px solid #EEE;display:flex;flex-direction:column;gap:4px}
.chat-messages{flex:1;padding:10px;overflow-y:auto;background:#F4F4F4;display:flex;flex-direction:column;gap:8px}
.bubble{max-width:85%;padding:8px 10px;border-radius:10px;line-height:1.4}
.bubble.bot{background:#FFF;align-self:flex-start}
.bubble.user{background:var(--ali-red);color:#FFF;align-self:flex-end}
.chat-input-row{padding:6px;background:#FFF;border-top:1px solid #EEE;display:flex;gap:6px}

/* ボトムナビ */
.bottom-nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:440px;background:#FFF;border-top:1px solid var(--border-color);display:flex;justify-content:around;padding:6px 0;z-index:100}
.nav-item{background:none;border:none;color:#666;display:flex;flex-direction:column;align-items:center;flex:1;cursor:pointer;font-weight:bold}
.nav-item.active{color:var(--ali-red)}

#success-pop{display:none;position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);background:rgba(0,0,0,0.8);color:#FFF;padding:12px 20px;border-radius:20px;z-index:300;text-align:center}
</style>
</head>
<body>

<div id="success-pop">📦 注文が正常に処理されました</div>

<!-- 配送追跡モーダル(アリエク風) -->
<div id="tracking-modal" class="modal-overlay" onclick="closeTrackingModal()">
  <div class="modal-sheet" onclick="event.stopPropagation()">
    <div class="modal-header">
      <h3 style="font-size:13px;font-weight:bold;" id="m-title">配送ステータス詳細</h3>
      <span style="cursor:pointer;font-size:14px;font-weight:bold;" onclick="closeTrackingModal()">✕</span>
    </div>
    <div style="background:#F5F5F5;padding:8px;border-radius:6px;margin-bottom:12px;">
      <p>物流追跡コード: <strong id="m-code" style="font-size:12px;">--</strong></p>
      <p style="margin-top:4px;">お届け先住所: <span id="m-addr">--</span></p>
    </div>
    <div id="m-timeline" class="timeline-container"></div>
  </div>
</div>

<header>
  <div class="hdr-top">
    <span class="back-arrow">❮</span>
    <div class="search-container">
      <input type="text" id="search-box" class="search-input" placeholder="注文ID、商品名、またはキーワード..." oninput="renderCatalog()">
    </div>
    <div class="hdr-icons"><span>🎨</span><span>🎧</span><span>🗑</span></div>
  </div>
  <div class="order-tabs">
    <div class="o-tab" onclick="switchTab('shop')">すべて</div>
    <div class="o-tab" onclick="switchTab('shop')">支払い待ち</div>
    <div class="o-tab" onclick="switchTab('shop')">処理中</div>
    <div class="o-tab active" id="tab-tracker-link" onclick="switchTab('track')">処理済み</div>
    <div class="o-tab" onclick="switchTab('shop')">返金/返品</div>
  </div>
</header>

<div class="container">
  <!-- 1. カタログ画面 -->
  <div id="sec-shop" class="tab-content">
    <div id="catalog-grid" class="p-grid"></div>
    <div class="alie-card" style="margin-top:10px;">
      <h4 style="font-weight:bold;margin-bottom:6px;color:var(--ali-red);font-size:12px;">🛒 配送先情報入力カウンター</h4>
      <form onsubmit="placeOrder(event)" style="display:flex;flex-direction:column;gap:6px">
        <input type="text" id="cust-name" required placeholder="配送先氏名" style="padding:6px;border:1px solid #DDD;border-radius:4px;">
        <input type="text" id="cust-addr" required placeholder="配送先住所詳細" style="padding:6px;border:1px solid #DDD;border-radius:4px;">
        <button type="submit" class="btn-buy" style="padding:8px;">上記住所で注文を確定する</button>
      </form>
    </div>
  </div>

  <!-- 2. アリエク風 配送追跡センター -->
  <div id="sec-track" class="tab-content active">
    <div id="empty-notice" style="text-align:center;padding:4px;color:#999;font-weight:bold;display:none;">注文済みの商品はありません。</div>
    <div id="orders-list-container"></div>
  </div>

  <!-- 3. カスタマーサポートチャット（追跡連動型） -->
  <div id="sec-chat" class="tab-content">
    <div class="chat-window">
      <div class="chat-top-bar">
        <span style="font-weight:bold;color:#444;">🎯 サポート対象の追跡番号を指定してください:</span>
        <select id="chat-target-code" style="padding:4px;border:1px solid #CCC;border-radius:4px;font-size:11px;">
          <option value="">-- 選択してください (アクティブな追跡オブジェクト) --</option>
        </select>
      </div>
      <div id="chat-box" class="chat-messages">
        <div class="bubble bot">
          🤖 ロジスティクス・カスタムコンシェルジュです。<br>
          上部のドロップダウンで追跡番号を選択後、下のボタンで「催促」「住所変更」「キャンセル」の指令を物流システムへ直結送信できます。
        </div>
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:4px;padding:4px;background:#FFF;border-top:1px solid #EEE;">
        <button class="btn-secondary" style="font-size:10px;padding:4px;" onclick="triggerChatAction('催促')">🚀 発送の催促</button>
        <button class="btn-secondary" style="font-size:10px;padding:4px;" onclick="triggerChatAction('住所変更')">📍 住所変更</button>
        <button class="btn-secondary" style="font-size:10px;padding:4px;color:var(--ali-red);" onclick="triggerChatAction('キャンセル')">❌ キャンセル</button>
      </div>
      <div class="chat-input-row">
        <input type="text" id="chat-input" style="flex:1;padding:6px 12px;border:1px solid #DDD;border-radius:15px;outline:none;" placeholder="メッセージを入力..." onkeypress="if(event.key==='Enter')sendChatText()">
        <button class="btn-buy" style="width:60px;margin:0;border-radius:15px;" onclick="sendChatText()">送信</button>
      </div>
    </div>
  </div>
</div>

<div class="bottom-nav">
  <button id="nav-item-shop" class="nav-item" onclick="switchTab('shop')"><span style="font-size:14px;">🏠</span>カタログ</button>
  <button id="nav-item-track" class="nav-item active" onclick="switchTab('track')"><span style="font-size:14px;">📦</span>注文・追跡</button>
  <button id="nav-item-chat" class="nav-item" onclick="switchTab('chat')"><span style="font-size:14px;">💬</span>チャット窓口</button>
</div>

<script>
const SHEET_PROD_URL = "https://docs.google.com/spreadsheets/d/1LK09yYcLi63EW9-xhXIENfszwyFLC4Jmz_-tO69ab94/export?format=csv&gid=0";
const SHEET_TRACK_URL = "https://docs.google.com/spreadsheets/d/178-dcD4xd0fUdEORnoC9haQrKmfGiKTaY0OxiOKBRrQ/export?format=csv&gid=0";
const FORMSPREE_URL = "https://formspree.io/f/xrenqbpg";

const STAGES_11 = [
  "データ受付完了", "倉庫での選別・梱包", "国際交換局へ提出", "保税区通関手続き通過", 
  "グローバル航空便 出港", "日本国内保税拠点に到着", "国内通関手続き開始", "通関許可・国内業者へ引渡", 
  "国内配送網トランスファー", "お荷物は地元拠点より配達中", "配達済み(追跡終了)"
];

const MOCK_CATALOG = [
  { id: 101, name: "ターボハンドヘルド小型ファン USB 充電ミニ屋外ポータブル", price: 395, icon: "🌀", wh: "CHINA", store: "Shop1103753228 Store" },
  { id: 102, name: "ポータブルワイヤレス Bluetooth スピーカー LED ライト搭載", price: 170, icon: "🔊", wh: "CHINA", store: "Fomscvka Choice Store" },
  { id: 103, name: "急速充電対応 Type-C 高耐久ナイロンメッシュケーブル 1m", price: 120, icon: "🔌", wh: "JAPAN", store: "Choice Electronics Japan" }
];

let orders = [];
let trackingPool = [];
let bgSyncInterval = null;

async function initApp() {
  renderCatalog();
  setupBgSync();
}

function renderCatalog() {
  const grid = document.getElementById('catalog-grid');
  grid.innerHTML = "";
  const q = document.getElementById('search-box').value.toLowerCase();
  
  MOCK_CATALOG.forEach(p => {
    if(q && !p.name.toLowerCase().includes(q)) return;
    grid.innerHTML += `
      <div class="p-card">
        <div class="img-box"><span class="choice-badge">Choice</span>${p.icon}</div>
        <div style="font-weight:bold;margin-top:4px;height:26px;overflow:hidden;line-height:1.2;">${p.name}</div>
        <div class="price-line">¥${p.price}</div>
        <button class="btn-buy" onclick="quickBuy(${p.id})">即時購入</button>
      </div>
    `;
  });
}

let selectedProduct = MOCK_CATALOG[0];
function quickBuy(id) {
  selectedProduct = MOCK_CATALOG.find(x => x.id === id);
  const pop = document.getElementById('success-pop');
  pop.innerText = `🛒 カート選択: ${selectedProduct.name}`;
  pop.style.display = 'block';
  setTimeout(() => pop.style.display='none', 1500);
}

async function fetchTrackingState() {
  try {
    const res = await fetch(SHEET_TRACK_URL + "&t=" + new Date().getTime());
    const text = await res.text();
    trackingPool = text.split('\n').slice(1).map(row => {
      if (!row.trim()) return null;
      const cols = row.split(',').map(c => c.replace(/^"(.*)"$/, '$1').trim());
      return { code: cols[0], stepStr: cols[1] ? cols[1].trim() : "", step: parseInt(cols[1]) || 0, memo: cols[2] || "" };
    }).filter(Boolean);
  } catch(e) {}
}

function setupBgSync() {
  if(bgSyncInterval) clearInterval(bgSyncInterval);
  bgSyncInterval = setInterval(async () => {
    await fetchTrackingState();
    let updated = false;

    orders.forEach(ord => {
      if(ord.isCancelled || ord.isClosed) return;

      // 🈳枠の自動獲得シミュレーション
      if(ord.isWaiting) {
        let freeObj = trackingPool.find(p => p.stepStr === "" && p.code.startsWith(ord.prefixType) && !orders.some(o => o.tn === p.code));
        if(freeObj) {
          ord.tn = freeObj.code;
          ord.isWaiting = false;
          ord.step = 0;
          ord.logs.push(`[${new Date().toLocaleTimeString()}] 物流空き枠を検知。追跡番号 [${ord.tn}] が自動適用されました。`);
          updated = true;
        }
        return;
      }

      let match = trackingPool.find(p => p.code === ord.tn);
      if(match) {
        if(match.stepStr !== "" && match.step !== ord.step) {
          ord.step = Math.min(10, match.step);
          ord.logs.push(`[${new Date().toLocaleTimeString()}] 状態更新: ${STAGES_11[ord.step]}`);
          if(ord.step === 10) {
            ord.isClosed = true;
            ord.logs.push(`[システム完了] お荷物の配達完了を確認。追跡セッションをクローズしました。`);
          }
          updated = true;
        }
        if(match.memo && (!ord.lastMemo || ord.lastMemo !== match.memo)) {
          ord.lastMemo = match.memo;
          ord.logs.push(`[伝達通知] ${match.memo}`);
          updated = true;
        }
      }
    });

    if(updated) {
      if(document.getElementById('sec-track').classList.contains('active')) renderOrders();
      updateChatDropdown();
    }
  }, 1000); // 1秒毎の超高速バックグラウンド同期
}

async function placeOrder(e) {
  e.preventDefault();
  const name = document.getElementById('cust-name').value;
  const addr = document.getElementById('cust-addr').value;

  await fetchTrackingState();
  let prefix = selectedProduct.wh === "JAPAN" ? "JP" : "LP";
  
  // 空きコードを検索
  let freeObj = trackingPool.find(p => p.stepStr === "" && p.code.startsWith(prefix) && !orders.some(o => o.tn === p.code));
  
  let finalCode = `(待ち番号プール参照中)`;
  let isWaiting = true;
  if(freeObj) {
    finalCode = freeObj.code;
    isWaiting = false;
  }

  const newOrd = {
    id: "AX-" + new Date().getTime(),
    name: name,
    addr: addr,
    product: selectedProduct,
    tn: finalCode,
    prefixType: prefix,
    step: 0,
    isWaiting: isWaiting,
    isCancelled: false,
    isClosed: false,
    lastMemo: "",
    logs: [`[${new Date().toLocaleTimeString()}] プラットフォーム上での決済および注文受け付け処理が完了しました。`]
  };

  orders.push(newOrd);
  
  try {
    await fetch(FORMSPREE_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ name, address: addr, tracking: finalCode, item: selectedProduct.name })
    });
  } catch(err){}

  const pop = document.getElementById('success-pop');
  pop.innerText = "📦 アリエク注文承認成功！";
  pop.style.display = 'block';
  setTimeout(() => { pop.style.display='none'; switchTab('track'); }, 1200);
}

function renderOrders() {
  const container = document.getElementById('orders-list-container');
  container.innerHTML = "";
  
  if(orders.length === 0) {
    document.getElementById('empty-notice').style.display = 'block';
    return;
  }
  document.getElementById('empty-notice').style.display = 'none';

  orders.forEach(ord => {
    let alertHtml = "";
    let actionBtnHtml = "";
    
    // 指示通りの空き枠アナウンス制御
    if(ord.isCancelled) {
      alertHtml = `<div class="status-alert-box alert-waiting">🛑 この注文はユーザーによりキャンセル処理されました。物流ラインは停止しています。</div>`;
      actionBtnHtml = `<button class="btn-secondary" onclick="deleteLog('${ord.id}')">ログ削除</button>`;
    } else if(ord.isClosed) {
      alertHtml = `<div class="status-alert-box alert-ready">🔒 お荷物の配達が完了しました。追跡クローズ済みです。</div>`;
      actionBtnHtml = `<button class="btn-primary-outline" onclick="openTrackingModal('${ord.id}')">追跡詳細確認</button>`;
    } else if(ord.isWaiting) {
      // 🈳がないときの説明
      alertHtml = `
        <div class="status-alert-box alert-waiting" style="flex-direction:column;gap:4px;">
          <div style="font-weight:bold;color:var(--ali-red);">⚠️ 現在、(${ord.prefixType})の物流追跡番号の🈳がありません。</div>
          <div style="color:#777;font-size:10px;">🈳がでるまでお待ちください。システムが1秒毎に空きスロットを監視しています。</div>
        </div>`;
      actionBtnHtml = `<button class="btn-disabled">追跡待ち...</button>`;
    } else {
      // 🈳が出たときの説明
      alertHtml = `
        <div class="status-alert-box alert-ready" style="flex-direction:column;gap:4px;">
          <div style="font-weight:bold;color:#2E7D32;">✨ 荷物追跡番号🈳があります。</div>
          <div style="color:#555;font-size:10px;">追跡番号 [<strong>${ord.tn}</strong>] が割り当てられました。下の「ステータスを追跡する」ボタンを押して、追跡を開始しましょう！</div>
          <div style="background:#FFF;padding:4px;border-radius:4px;margin-top:2px;color:#444;border-left:2px solid #4CAF50;">最新状況: ${STAGES_11[ord.step]}</div>
        </div>`;
      actionBtnHtml = `<button class="btn-primary-outline" onclick="openTrackingModal('${ord.id}')">ステータスを追跡する</button><button class="btn-secondary">受取確認</button>`;
    }

    container.innerHTML += `
      <div class="alie-card">
        <div class="store-header">
          <div><span class="store-choice">Choice</span><span class="store-name">${ord.product.store} ❯</span></div>
        </div>
        <div class="prod-row">
          <div class="prod-img">${ord.product.icon}</div>
          <div class="prod-details">
            <div class="prod-title">${ord.product.name}</div>
            <div style="color:#999;font-size:9px;">仕様: デフォルトメインランド仕様</div>
            <div class="prod-price-row">
              <span style="font-weight:bold;font-size:12px;">¥${ord.product.price}</span>
              <span style="color:#999;">x1</span>
            </div>
          </div>
        </div>
        <div style="text-align:right;margin-bottom:8px;color:#999;font-size:10px;">1 個の商品合計: <strong style="color:#333;font-size:11px;">¥${ord.product.price}</strong></div>
        
        ${alertHtml}
        
        <div class="card-actions">
          ${actionBtnHtml}
        </div>
      </div>
    `;
  });
}

function openTrackingModal(id) {
  const ord = orders.find(o => o.id === id);
  if(!ord) return;
  
  document.getElementById('m-code').innerText = ord.tn;
  document.getElementById('m-addr').innerText = `${ord.name} 様 (${ord.addr})`;
  
  const tl = document.getElementById('m-timeline');
  tl.innerHTML = "";
  
  // 11段階のタイムライン生成
  STAGES_11.forEach((stageName, idx) => {
    let nodeClass = "timeline-node";
    if(idx <= ord.step) nodeClass += " active";
    
    tl.innerHTML += `
      <div class="${nodeClass}">
        <div class="timeline-dot"></div>
        <div class="node-title">${idx + 1}. ${stageName}</div>
        <div style="color:#999;font-size:9px;margin-top:2px;">システム同期完了 - リアルタイムステータス</div>
      </div>
    `;
  });

  document.getElementById('tracking-modal').style.display = 'flex';
}

function closeTrackingModal() {
  document.getElementById('tracking-modal').style.display = 'none';
}

function deleteLog(id) {
  orders = orders.filter(o => o.id !== id);
  renderOrders();
  updateChatDropdown();
}

function updateChatDropdown() {
  const select = document.getElementById('chat-target-code');
  const val = select.value;
  select.innerHTML = '<option value="">-- 選択してください (アクティブな追跡番号) --</option>';
  orders.forEach(o => {
    if(!o.isCancelled && !o.isClosed && !o.isWaiting) {
      select.innerHTML += `<option value="${o.id}">${o.tn} (${o.product.name.substring(0,10)}...)</option>`;
    }
  });
  select.value = val;
}

function appendChat(text, sender) {
  const box = document.getElementById('chat-box');
  const b = document.createElement('div');
  b.className = `bubble ${sender}`;
  b.innerHTML = text;
  box.appendChild(b);
  box.scrollTop = box.scrollHeight;
}

function triggerChatAction(type) {
  const id = document.getElementById('chat-target-code').value;
  if(!id) {
    appendChat(`🤖 <strong>[システム警告]</strong> 上部の選択欄から、アクションを実行したい有効な追跡番号を選択してください。`, 'bot');
    return;
  }
  const ord = orders.find(o => o.id === id);
  if(!ord) return;

  if(type === '催促') {
    appendChat(`🚀 追跡番号 [${ord.tn}] の発送催促シグナルを送信してください。`, 'user');
    setTimeout(() => {
      ord.logs.push(`[${new Date().toLocaleTimeString()}] チャット命令によりフルフィルメント優先発送コマンドを実行しました。`);
      appendChat(`🤖 了解いたしました！追跡番号 <strong>${ord.tn}</strong> の物流優先度を「最優先」へ上書き命令を書き込みました！`, 'bot');
      renderOrders();
    }, 500);
  } else if(type === '住所変更') {
    appendChat(`📍 追跡番号 [${ord.tn}] の送り先を変更したいです。`, 'user');
    setTimeout(() => {
      appendChat(`🤖 住所のオンライン変更ですね。下のテキスト入力欄に「<strong>住所変更：(新しい住所)</strong>」と入力して送信してください。`, 'bot');
    }, 500);
  } else if(type === 'キャンセル') {
    if(!confirm("この商品の追跡番号をプールに戻し、配送ラインを強制終了しますか？")) return;
    appendChat(`❌ 追跡番号 [${ord.tn}] の注文をキャンセルします。`, 'user');
    setTimeout(() => {
      ord.isCancelled = true;
      ord.logs.push(`[キャンセル完了] ユーザーのチャットコマンドにより、該当お荷物の追跡ラインを凍結しました。`);
      appendChat(`🤖 了解しました。追跡番号 <strong>${ord.tn}</strong> の輸送手続きをインターセプトし、空き枠をグローバルプールに返却しました。`, 'bot');
      renderOrders();
      updateChatDropdown();
    }, 500);
  }
}

function sendChatText() {
  const inp = document.getElementById('chat-input');
  const txt = inp.value.trim();
  if(!txt) return;

  appendChat(txt, 'user');
  inp.value = "";

  setTimeout(() => {
    const id = document.getElementById('chat-target-code').value;
    if(txt.startsWith("住所変更：") || txt.startsWith("住所変更:")) {
      if(!id) {
        appendChat(`🤖 先に上部で対象の追跡番号を選択してから、住所変更テキストを送信してください。`, 'bot');
        return;
      }
      let ord = orders.find(o => o.id === id);
      let newAddr = txt.replace(/^住所変更[：:]/, "").trim();
      ord.addr = newAddr;
      ord.logs.push(`[宛先変更] チャット経由で配送先情報を変更 ➔ ${newAddr}`);
      appendChat(`🤖 配送変更をオンライン反映しました！お荷物 [<strong>${ord.tn}</strong>] の宛先を「${newAddr}」へ修正完了しました。`, 'bot');
      renderOrders();
    } else {
      appendChat(`🤖 ロジスティクスセンターとパケットを同期中...。特定の操作を行う場合は、上の番号を選択して専用アクションボタンを押すと素早く連携が完了します。`, 'bot');
    }
  }, 600);
}

function switchTab(tab) {
  document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
  document.querySelectorAll('.nav-item').forEach(b => b.classList.remove('active'));
  document.querySelectorAll('.o-tab').forEach(t => t.classList.remove('active'));

  if(tab === 'shop') {
    document.getElementById('sec-shop').classList.add('active');
    document.getElementById('nav-item-shop').classList.add('active');
  } else if(tab === 'track') {
    document.getElementById('sec-track').classList.add('active');
    document.getElementById('nav-item-track').classList.add('active');
    document.getElementById('tab-tracker-link').classList.add('active');
    renderOrders();
  } else if(tab === 'chat') {
    document.getElementById('sec-chat').classList.add('active');
    document.getElementById('nav-item-chat').classList.add('active');
    updateChatDropdown();
  }
}

initApp();
</script>
</body>
</html>
