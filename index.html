<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>安全产品出荷 - FIFO待機番号システム</title>
<style>
:root{--ali-orange:#FF4747;--ali-red:#FD384F;--ali-black:#191919;--bg-gray:#F2F2F7;--cainiao-blue:#0052CC;--chat-green:#4CAF50;--success:#2E7D32}
*{box-sizing:border-box;margin:0;padding:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;font-size:11px}
body{background:var(--bg-gray);color:var(--ali-black);max-width:420px;margin:0 auto;min-height:100vh;position:relative;border-left:1px solid #E0E0E0;border-right:1px solid #E0E0E0;box-shadow:0 0 20px rgba(0,0,0,0.05);padding-bottom:60px}

header{background:#FFF;padding:8px 12px;position:sticky;top:0;z-index:90}
.header-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px}
.logo{font-size:16px;font-weight:900;color:var(--ali-black);letter-spacing:-0.5px}
.logo span{color:var(--ali-red)}
.coin-badge{background:#FFF8E1;color:#FFA000;border:1px solid #FFE082;padding:2px 8px;border-radius:12px;font-weight:bold;font-size:10px}
.search-bar-wrap{display:flex;align-items:center;background:#F0F0F0;border-radius:20px;padding:4px 6px 4px 12px;border:2px solid var(--ali-black)}
.search-input{border:none;background:none;outline:none;flex:1;font-size:12px;color:#333}
.search-btn{background:var(--ali-black);color:#FFF;border:none;border-radius:50%;width:26px;height:26px;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:12px}

.cat-nav{display:flex;justify-content:space-between;background:#FFF;padding:8px;margin-bottom:6px}
.cat-item{display:flex;flex-direction:column;align-items:center;gap:4px;flex:1;cursor:pointer}
.cat-item.selected .cat-icon{background:#FFEAEA;border:1px solid var(--ali-red)}
.cat-icon{font-size:18px;background:#F9F9F9;width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center}
.cat-label{font-size:9px;color:#666;font-weight:bold}

.warehouse-tabs{display:flex;background:#FFF;border-bottom:1px solid #EAEAEA}
.wh-tab{flex:1;text-align:center;padding:10px;font-weight:bold;cursor:pointer;color:#666;border-bottom:3px solid transparent;font-size:12px}
.wh-tab.active{color:var(--ali-red);border-bottom-color:var(--ali-red);font-weight:900}

.container{padding:8px}
.tab-content{display:none}
.tab-content.active{display:block}

.p-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.p-card{background:#FFF;border-radius:12px;overflow:hidden;box-shadow:0 1px 4px rgba(0,0,0,0.04);display:flex;flex-direction:column;justify-content:space-between;padding:8px;border:1px solid #EAEAEA}
.img-box{background:#F4F4F4;height:120px;border-radius:8px;display:flex;justify-content:center;align-items:center;color:#444;font-size:48px;position:relative}
.discount-tag{position:absolute;top:4px;left:4px;background:var(--ali-red);color:#FFF;font-size:9px;font-weight:bold;padding:2px 6px;border-radius:4px}
.p-info{padding:6px 0 0 0;display:flex;flex-direction:column;gap:3px}
.opt-select{width:100%;padding:4px;font-size:10px;margin:2px 0;background:#F6F6F6;border:1px solid #E0E0E0;border-radius:6px;outline:none;color:#333}
.price-box{margin-top:2px;display:flex;align-items:baseline;gap:4px;flex-wrap:wrap}
.sale-price{color:var(--ali-red);font-weight:900;font-size:14px}
.original-price{text-decoration:line-through;color:#999;font-size:9px}

.btn-buy{background:linear-gradient(90deg,#FF8800,#FF3300);color:#FFF;border:none;border-radius:18px;padding:6px;cursor:pointer;font-weight:bold;font-size:11px;margin-top:4px;text-align:center;width:100%}
.panel{background:#FFF;border-radius:12px;padding:12px;margin-top:8px;box-shadow:0 1px 4px rgba(0,0,0,0.04);border:1px solid #EAEAEA}

.track-card{background:#FFF;border-radius:12px;padding:12px;margin-bottom:10px;box-shadow:0 2px 6px rgba(0,0,0,0.04);border:1px solid #EAEAEA;position:relative}
.track-card.cancelled{background:#F5F5F5;opacity:0.75;border:2px dashed #999}
.track-header{display:flex;justify-content:space-between;font-weight:bold;margin-bottom:6px;border-bottom:1px solid #F0F0F0;padding-bottom:6px;align-items:center}
.carrier-badge{background:#E8F0FE;color:var(--cainiao-blue);padding:2px 6px;border-radius:4px;font-size:9px;font-weight:bold}
.btn-delete-history{background:#FFEBEE;color:var(--ali-red);border:1px solid #FFCDD2;border-radius:4px;padding:2px 6px;cursor:pointer;font-weight:bold;font-size:9px;float:right}

.progress-container{display:flex;justify-content:space-between;margin:12px 4px 22px 4px;position:relative}
.progress-line{position:absolute;top:5px;left:2%;right:2%;height:3px;background:#ECEFF1;z-index:1}
.progress-line-fill{position:absolute;top:5px;left:2%;height:3px;background:#4CAF50;z-index:2;transition:width 0.4s ease}
.progress-dot{width:13px;height:13px;border-radius:50%;background:#FFF;border:3px solid #CFD8DC;z-index:3;display:flex;justify-content:center;align-items:center;position:relative}
.progress-dot.active{border-color:#4CAF50;background:#4CAF50}
.progress-dot span{position:absolute;top:16px;font-size:8px;color:#90A4AE;white-space:nowrap;left:50%;transform:translateX(-50%)}
.progress-dot.active span{color:#2E7D32;font-weight:bold}

.log-box{background:#F7F9FA;border:1px solid #EDF1F2;border-radius:6px;padding:8px;font-size:10px;color:#37474F;max-height:140px;overflow-y:auto;margin-top:10px}
.carrier-memo-log{background:#FFF9C4;border-left:3px solid #FBC02D;padding:4px 6px;margin-bottom:4px;font-weight:bold;color:#5D4037}
.no-code-alert{background:#FFF3E0;border:1px solid #FFB74D;border-radius:8px;padding:10px;margin-bottom:10px;color:#E65100}

.btn-lock-confirm{background:#4CAF50;color:#FFF;border:none;padding:8px 12px;border-radius:4px;font-weight:bold;cursor:pointer;margin-top:4px;width:100%;font-size:12px;animation:pulse 1.5s infinite}
@keyframes pulse{0%{opacity:1}50%{opacity:0.7}100%{opacity:1}}

.chat-container{display:flex;flex-direction:column;background:#FFF;border-radius:12px;height:480px;border:1px solid #EAEAEA;box-shadow:0 2px 8px rgba(0,0,0,0.05);overflow:hidden}
.chat-header{background:var(--ali-black);color:#FFF;padding:10px;display:flex;flex-direction:column;gap:2px}
.chat-title{font-size:13px;font-weight:900;display:flex;align-items:center;gap:6px}
.chat-status{font-size:10px;color:#00E676}
.chat-body{flex:1;padding:12px;overflow-y:auto;background:#F5F5F9;display:flex;flex-direction:column;gap:10px}
.msg{display:flex;flex-direction:column;max-width:85%;padding:8px 12px;border-radius:14px;line-height:1.4;position:relative}
.msg.seller{background:#FFF;color:#333;align-self:flex-start;border-top-left-radius:2px;box-shadow:0 1px 2px rgba(0,0,0,0.05)}
.msg.user{background:linear-gradient(135deg,#FF8800,#FF3300);color:#FFF;align-self:flex-end;border-top-right-radius:2px}
.msg-time{font-size:8px;color:#999;align-self:flex-end;margin-top:3px}

.chat-footer{background:#FFF;border-top:1px solid #EAEAEA;padding:8px;display:flex;flex-direction:column;gap:6px}
.quick-chips{display:flex;gap:6px;overflow-x:auto;padding-bottom:4px;white-space:nowrap}
.chip{background:#F0F0F0;color:#555;padding:4px 10px;border-radius:12px;cursor:pointer;font-size:10px;font-weight:bold;border:1px solid #E0E0E0}
.input-row{display:flex;gap:6px}
.chat-input{flex:1;padding:8px 12px;border:1px solid #DDD;border-radius:20px;outline:none;font-size:12px}
.chat-send-btn{background:var(--ali-black);color:#FFF;border:none;border-radius:20px;padding:0 16px;cursor:pointer;font-weight:bold}

.bottom-nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:420px;background:#FFF;border-top:1px solid #EAEAEA;display:flex;justify-content:space-around;align-items:center;padding:6px 0;z-index:100}
.nav-btn{background:none;border:none;color:#666;display:flex;flex-direction:column;align-items:center;gap:2px;cursor:pointer;flex:1;font-weight:bold;font-size:9px}
.nav-btn.active{color:var(--ali-red)}

#success-modal{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.6);z-index:120;justify-content:center;align-items:center}
.success-box{background:#FFF;border-radius:16px;width:300px;padding:24px;text-align:center}
.login-status-bar{background:#E8F5E9;color:var(--success);padding:6px 12px;font-weight:bold;text-align:right;border-bottom:1px solid #C8E6C9}
</style>
</head>
<body>

<div id="success-modal">
  <div class="success-box">
    <div style="font-size:40px;margin-bottom:10px">📦</div>
    <h3 style="font-size:14px;font-weight:900;margin-bottom:6px;color:#2E7D32">注文が完了しました</h3>
    <p id="modal-desc" style="color:#666;font-size:10px;margin-bottom:12px"></p>
    <button class="btn-buy" style="width:100%" onclick="closeSuccess()">追跡画面へ</button>
  </div>
</div>

<header>
  <div class="header-top">
    <div class="logo">安全产品<span>出荷</span></div>
    <div class="coin-badge">🪙 初回100円引きクーポン対象店 ＞</div>
  </div>
  <div class="search-bar-wrap">
    <input type="text" id="search-box" class="search-input" placeholder="商品を検索..." oninput="filterBySearch()">
    <button class="search-btn" onclick="filterBySearch()">🔍</button>
  </div>
</header>

<div id="login-bar" class="login-status-bar" style="display:none;"></div>

<div class="cat-nav">
  <div class="cat-item selected" onclick="filterByCategory('ALL', this)"><div class="cat-icon">✨</div><div class="cat-label">すべて</div></div>
  <div class="cat-item" onclick="filterByCategory('おすすめ', this)"><div class="cat-icon">❤️</div><div class="cat-label">おすすめ</div></div>
  <div class="cat-item" onclick="filterByCategory('テック', this)"><div class="cat-icon">📱</div><div class="cat-label">テック</div></div>
  <div class="cat-item" onclick="filterByCategory('美容', this)"><div class="cat-icon">💄</div><div class="cat-label">美容・ホーム</div></div>
</div>

<div class="warehouse-tabs">
  <div id="tab-china" class="wh-tab active" onclick="switchWarehouse('CHINA')">🇨🇳 グローバルハブ便</div>
  <div id="tab-japan" class="wh-tab" onclick="switchWarehouse('JAPAN')">🇯🇵 国内スピード便</div>
</div>

<div class="container">
  <!-- ホーム（ショップ）画面 -->
  <div id="c-shop" class="tab-content active">
    <div id="live-loading" style="text-align:center;padding:30px;font-weight:bold;color:#666;">🔄 製品棚読み込み中...</div>
    <div id="p-grid" class="p-grid" style="display:none;"></div>
    
    <div class="panel">
      <h4 style="font-weight:900;margin-bottom:8px;font-size:12px;color:var(--ali-red)">🛒 チェックアウト</h4>
      <div id="cart-list" style="margin:6px 0;color:#555;line-height:1.5;">カートは空です。</div>
      <div style="border-top:1px dashed #CFD8DC;padding-top:6px;margin:8px 0;">
        <div class="price-row" style="display:flex;justify-content:space-between;"><span>小計:</span><span id="subtotal-val">0円</span></div>
        <div class="price-row" style="display:flex;justify-content:space-between;font-weight:900;font-size:13px;margin-top:4px;border-top:1px solid #EEE;padding-top:4px;">
          <span>総合計:</span><span id="total" style="color:var(--ali-red);font-size:16px">0円</span>
        </div>
      </div>
      <form onsubmit="order(event)" style="display:flex;flex-direction:column;gap:6px">
        <input type="text" id="name" required placeholder="受取人氏名" style="padding:8px;border:1px solid #DDD;border-radius:6px;">
        <input type="text" id="addr" required placeholder="配送先詳細住所" style="padding:8px;border:1px solid #DDD;border-radius:6px;">
        <button type="submit" class="btn-buy">安全な注文を確定する</button>
      </form>
    </div>
  </div>

  <!-- 追跡画面 -->
  <div id="c-my" class="tab-content">
    <div id="no-ord" style="text-align:center;padding:40px;color:#999;">🚚 案件なし。</div>
    <div id="multi-track-container"></div>
  </div>

  <!-- チャット画面 -->
  <div id="c-chat" class="tab-content">
    <div class="chat-container">
      <div class="chat-header">
        <div class="chat-title">🏢 公式自動サポート</div>
        <div id="seller-status-text" class="chat-status">🟢 AI稼働中</div>
      </div>
      <div id="chat-box" class="chat-body">
        <div class="msg seller">トラッキングIDを入力してください。</div>
      </div>
      <div class="chat-footer">
        <div id="chat-quick-wrap" class="quick-chips" style="display:none;"></div>
        <div class="input-row">
          <input type="text" id="chat-input-field" class="chat-input" placeholder="IDを入力...">
          <button class="chat-send-btn" onclick="sendUserMessage()">送信</button>
        </div>
      </div>
    </div>
  </div>
</div>

<div class="bottom-nav">
  <button id="nav-shop" class="nav-btn active" onclick="switchTab('shop')">🏠 ホーム</button>
  <button id="nav-my" class="nav-btn" onclick="switchTab('my')">📦 追跡</button>
  <button id="nav-chat" class="nav-btn" onclick="switchTab('chat')">💬 チャット</button>
</div>

<script>
const SHEET_PROD_URL = "https://docs.google.com/spreadsheets/d/1LK09yYcLi63EW9-xhXIENfszwyFLC4Jmz_-tO69ab94/export?format=csv&gid=0";
const SHEET_TRACK_URL = "https://docs.google.com/spreadsheets/d/178-dcD4xd0fUdEORnoC9haQrKmfGiKTaY0OxiOKBRrQ/export?format=csv&gid=0";
const FORMSPREE_URL = "https://formspree.io/f/xrenqbpg";

let products = { CHINA: [], JAPAN: [] };
let allProductsList = [];
let availableTrackingPool = [];
let cart = [];
let orders = JSON.parse(localStorage.getItem('ali_orders')) || [];
let currentWH = "CHINA";
let selectedCategory = "ALL";

// アプリ初期化
async function initApp() {
  await loadSpreadsheetData();
  renderProducts();
  renderTrackers();
  startLoop();
}

async function loadSpreadsheetData() {
  try {
    const resProd = await fetch(SHEET_PROD_URL);
    const csvProd = await resProd.text();
    const rowsProd = csvProd.split('\n').slice(1);
    products.CHINA = []; 
    products.JAPAN = [];
    allProductsList = [];

    rowsProd.forEach((row, idx) => {
      if (!row.trim()) return;
      const cols = row.split(',').map(c => c.replace(/^"(.*)"$/, '$1').trim());
      const warehouse = cols[0] ? cols[0].toUpperCase() : "CHINA";
      const optArray = (cols[5] || "標準").split(/\r?\n/).map(o => o.trim()).filter(Boolean);
      
      const pItem = {
        id: idx + 1,
        name: cols[1] || "製品",
        price: parseInt(cols[2]) || 0,
        category: cols[3] || "すべて",
        icon: cols[4] || "📦",
        opt: optArray,
        warehouse: warehouse
      };
      
      if(products[warehouse]) {
        products[warehouse].push(pItem);
      }
      allProductsList.push(pItem);
    });

    await refreshTrackingPool();
    document.getElementById('live-loading').style.display = 'none';
    document.getElementById('p-grid').style.display = 'grid';
  } catch (err) {
    console.error("データ読み込み失敗", err);
  }
}

async function refreshTrackingPool() {
  try {
    const resTrack = await fetch(SHEET_TRACK_URL + "&t=" + new Date().getTime());
    const csvTrack = await resTrack.text();
    availableTrackingPool = csvTrack.split('\n').slice(1).map(row => {
      if (!row.trim()) return null;
      const cols = row.split(',').map(c => c.replace(/^"(.*)"$/, '$1').trim());
      return { code: cols[0], step: parseInt(cols[1]) || 0, memo: cols[2] || "" };
    }).filter(Boolean);
  } catch(e){
    console.error("プール更新失敗", e);
  }
}

// 商品レンダリング
function renderProducts() {
  const grid = document.getElementById('p-grid');
  grid.innerHTML = "";
  let list = products[currentWH] || [];

  if(selectedCategory !== "ALL") {
    list = list.filter(p => p.category === selectedCategory);
  }

  const query = document.getElementById('search-box').value.trim().toLowerCase();
  if(query) {
    list = list.filter(p => p.name.toLowerCase().includes(query));
  }

  if(list.length === 0) {
    grid.innerHTML = `<div style="grid-column:1/3;text-align:center;padding:20px;color:#999;">該当する商品がありません。</div>`;
    return;
  }

  list.forEach(p => {
    let optHtml = p.opt.map(o => `<option value="${o}">${o}</option>`).join('');
    grid.innerHTML += `
      <div class="p-card">
        <div class="img-box"><span class="discount-tag">特割</span>${p.icon}</div>
        <div class="p-info">
          <div style="font-weight:bold;height:32px;overflow:hidden;font-size:11px;">${p.name}</div>
          <select id="opt-${p.id}" class="opt-select">${optHtml}</select>
          <div class="price-box">
            <span class="sale-price">¥${p.price.toLocaleString()}</span>
            <span class="original-price">¥${(p.price*1.5).toFixed(0)}</span>
          </div>
          <button class="btn-buy" onclick="addToCart(${p.id})">カートに追加</button>
        </div>
      </div>
    `;
  });
}

function filterByCategory(cat, el) {
  document.querySelectorAll('.cat-item').forEach(i => i.classList.remove('selected'));
  el.classList.add('selected');
  selectedCategory = cat;
  renderProducts();
}

function filterBySearch() {
  renderProducts();
}

function switchWarehouse(wh) {
  currentWH = wh;
  document.getElementById('tab-china').classList.toggle('active', wh === 'CHINA');
  document.getElementById('tab-japan').classList.toggle('active', wh === 'JAPAN');
  renderProducts();
}

function addToCart(pid) {
  const p = allProductsList.find(x => x.id === pid);
  if(!p) return;
  const optSign = document.getElementById(`opt-${pid}`).value;
  cart = [{ ...p, selectedOpt: optSign }]; // 仕様上、カートは上書き型
  updateCartUI();
}

function updateCartUI() {
  const list = document.getElementById('cart-list');
  if(cart.length === 0) {
    list.innerHTML = "カートは空です。";
    document.getElementById('subtotal-val').innerText = "0円";
    document.getElementById('total').innerText = "0円";
    return;
  }
  let p = cart[0];
  list.innerHTML = `<strong>${p.icon} ${p.name}</strong><br><span style="color:#666;font-size:10px;">仕様: ${p.selectedOpt} (発送元: ${p.warehouse === 'CHINA' ? '海外倉庫' : '国内倉庫'})</span>`;
  document.getElementById('subtotal-val').innerText = `¥${p.price.toLocaleString()}`;
  document.getElementById('total').innerText = `¥${p.price.toLocaleString()}`;
}

// 注文確定処理
async function order(e) {
  e.preventDefault();
  if(cart.length === 0) return alert("カートが空です");

  const name = document.getElementById('name').value;
  const addr = document.getElementById('addr').value;
  const p = cart[0];

  let prefix = p.warehouse === "JAPAN" ? "JP" : "LP"; 
  // 待機中オーダーからそのprefixの最大番号を取得して+1
  let currentWaiting = orders.filter(o => o.isPending && o.prefixGroup === prefix);
  let nextWaitNo = currentWaiting.length > 0 ? Math.max(...currentWaiting.map(o=>o.waitNumber)) + 1 : 1;

  const newOrder = {
    id: "ORD-" + new Date().getTime(),
    name: name,
    addr: addr,
    pName: p.name,
    pIcon: p.icon,
    opt: p.selectedOpt,
    price: p.price,
    prefixGroup: prefix,
    isPending: true,      // 最初は待機状態
    waitNumber: nextWaitNo, // 待機番号
    foundCode: null,      // マッチングしたコードが入る
    tn: null,             // ユーザーが「コード取得」を押すまでnull
    step: 0,
    isCancelled: false,
    isClosed: false
  };

  orders.push(newOrder);
  localStorage.setItem('ali_orders', JSON.stringify(orders));

  // Formspree送信
  try {
    await fetch(FORMSPREE_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ name: name, address: addr, product: p.name, option: p.selectedOpt, waitNo: prefix + "-" + nextWaitNo })
    });
  } catch(err){}

  cart = [];
  updateCartUI();
  document.getElementById('name').value = "";
  document.getElementById('addr').value = "";

  document.getElementById('modal-desc').innerText = `待機番号 [ ${prefix}-${nextWaitNo} ] で待機行列に入りました。`;
  document.getElementById('success-modal').style.display = 'flex';
}

function closeSuccess() {
  document.getElementById('success-modal').style.display = 'none';
  switchTab('my');
}

// 追跡画面レンダリング
function renderTrackers() {
  const container = document.getElementById('multi-track-container');
  const noOrd = document.getElementById('no-ord');
  container.innerHTML = "";

  if(orders.length === 0) {
    noOrd.style.display = 'block';
    return;
  }
  noOrd.style.display = 'none';

  orders.forEach(ord => {
    let html = "";
    if(ord.isPending) {
      // ■ 待機状態の表示
      html = `
        <div class="track-card">
          <div class="track-header">
            <span>⌛ 注文処理保留中 (出荷待ち行列)</span>
            <button class="btn-delete-history" onclick="deleteHistory('${ord.id}')">削除</button>
          </div>
          <div style="padding:4px 0; font-size:12px;">
            商品: <strong>${ord.pIcon} ${ord.pName}</strong> (${ord.opt})
          </div>
          <div class="no-code-alert" style="margin-top:6px;">
            現在、出荷ラインが大変混雑しています。<br>
            あなたの待機番号: <strong>${ord.prefixGroup}-${ord.waitNumber}</strong><br>
            ${ord.foundCode ? 
              `<span style="color:#2E7D32; font-weight:bold;">🎉 出荷枠が空きました！以下のボタンを押してコードを取得してください。</span>
               <button class="btn-lock-confirm" onclick="unlockCode('${ord.id}')">🔑 トラッキングコードを取得する</button>` 
              : `⏳ 前の枠が空くまでしばらくお待ちください。（自動で進みます）`}
          </div>
        </div>
      `;
    } else {
      // ■ 通常の追跡状態の表示
      const steps = ["注文受付", "倉庫引き渡し", "国際交換局", "航空会社渡", "日本到着", "通関中", "国内搬送", "配達中", "完了"];
      let dotsHtml = "";
      steps.forEach((st, i) => {
        let activeClass = (i <= ord.step) ? "active" : "";
        dotsHtml += `<div class="progress-dot ${activeClass}"><span>${st}</span></div>`;
      });
      let fillWidth = Math.min(100, (ord.step / (steps.length - 1)) * 100);

      let matchPool = availableTrackingPool.find(p => p.code === ord.tn) || {};
      let memoText = matchPool.memo || "荷物を準備中、まもなく発送されます。";

      html = `
        <div class="track-card ${ord.isCancelled ? 'cancelled' : ''}">
          <div class="track-header">
            <span class="carrier-badge">CAINIAO 菜鳥裹裹</span>
            <span style="font-size:10px; color:#666;">ID: ${ord.tn}</span>
            <button class="btn-delete-history" onclick="deleteHistory('${ord.id}')">削除</button>
          </div>
          <div style="margin:4px 0;">
            商品: <strong>${ord.pIcon} ${ord.pName}</strong> (${ord.opt})
          </div>
          
          <div class="progress-container">
            <div class="progress-line"></div>
            <div class="progress-line-fill" style="width: ${fillWidth}%"></div>
            ${dotsHtml}
          </div>

          <div class="log-box">
            <div class="carrier-memo-log">【最新の配送状況】<br>${memoText}</div>
            <div style="color:#999; margin-top:4px;">・タイムスタンプ: ${new Date().toLocaleTimeString()} (自動同期中)</div>
          </div>
        </div>
      `;
    }
    container.innerHTML += html;
  });
}

// ユーザーが手動で「コードを取得する」を押した時
function unlockCode(orderId) {
  let ord = orders.find(o => o.id === orderId);
  if(ord && ord.foundCode) {
    ord.tn = ord.foundCode; // 正式にトラッキングコードを確定
    ord.isPending = false;  // 待機状態を解除
    ord.step = 1;
    localStorage.setItem('ali_orders', JSON.stringify(orders));
    renderTrackers();
  }
}

function deleteHistory(orderId) {
  if(confirm("この履歴を削除しますか？")) {
    orders = orders.filter(o => o.id !== orderId);
    localStorage.setItem('ali_orders', JSON.stringify(orders));
    renderTrackers();
  }
}

// ⚙️ バックグラウンド同期ルーパー (FIFO一括解放ロジック内蔵)
let loopTimer = null;
function startLoop() {
  if(loopTimer) return;
  loopTimer = setInterval(async () => {
    await refreshTrackingPool();
    let isChanged = false;
    
    // 各配送グループごとに「待機番号の順」に処理
    ["JP", "LP", "CJ"].forEach(prefix => {
      // 1. このグループで「待機中」の人たちを番号の若い順に並べる
      let waitingOrders = orders.filter(o => o.isPending && o.prefixGroup === prefix)
                                .sort((a, b) => a.waitNumber - b.waitNumber);

      // 2. まだ誰にも割り当てられていない空きコード (step: 0) を探す
      let usableZeroPool = availableTrackingPool.filter(p => 
        p.step === 0 && 
        p.code.startsWith(prefix) &&
        !orders.some(o => o.tn === p.code || o.foundCode === p.code)
      );

      // 3. 【最重要】空きコードの個数（N個）だけ、先頭から順番にマッチング！
      // 前の人がボタンを押していなくても、foundCode にキープされて後ろは詰まりません。
      waitingOrders.forEach((ord, index) => {
        if (usableZeroPool[index] && ord.foundCode !== usableZeroPool[index].code) {
          ord.foundCode = usableZeroPool[index].code; // 枠をこの人に予約
          isChanged = true;
        }
      });
    });

    // 通常のステップ進行同期
    orders.forEach(ord => {
      if(ord.isCancelled || ord.isClosed || ord.isPending) return; 
      let match = availableTrackingPool.find(p => p.code === ord.tn);
      if(match && match.step !== ord.step) {
        ord.step = match.step;
        isChanged = true;
        if(ord.step === 11) ord.isClosed = true;
      }
    });
    
    if(isChanged) {
      localStorage.setItem('ali_orders', JSON.stringify(orders));
      renderTrackers();
    }
  }, 2000);
}

// チャット機能用ロジック
function sendUserMessage() {
  const input = document.getElementById('chat-input-field');
  const text = input.value.trim();
  if(!text) return;

  appendMessage(text, 'user');
  input.value = "";

  setTimeout(() => {
    // 簡易AI応答
    let matchOrder = orders.find(o => o.tn === text || o.id === text);
    if(matchOrder) {
      if(matchOrder.isPending) {
        appendMessage(`ID「${text}」は現在発送ラインの待機状態です。待機番号は ${matchOrder.prefixGroup}-${matchOrder.waitNumber} です。枠が空き次第ボタンが出現します。`, 'seller');
      } else {
        let pool = availableTrackingPool.find(p => p.code === matchOrder.tn) || {};
        appendMessage(`追跡番号 [ ${matchOrder.tn} ] の現在のステータスはステップ [ ${matchOrder.step} ] です。<br>状況: ${pool.memo || '調整中'}`, 'seller');
      }
    } else {
      appendMessage("お入力いただいたIDが見つからないか、処理中の可能性があります。追跡画面をご確認いただくか、正しい番号を入力してください。", 'seller');
    }
  }, 800);
}

function appendMessage(text, sender) {
  const box = document.getElementById('chat-box');
  box.innerHTML += `
    <div class="msg ${sender}">
      ${text}
      <div class="msg-time">${new Date().toLocaleTimeString()}</div>
    </div>
  `;
  box.scrollTop = box.scrollHeight;
}

// タブ切り替え機能
function switchTab(tab) {
  document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));

  if(tab === 'shop') {
    document.getElementById('c-shop').classList.add('active');
    document.getElementById('nav-shop').classList.add('active');
  } else if(tab === 'my') {
    document.getElementById('c-my').classList.add('active');
    document.getElementById('nav-my').classList.add('active');
    renderTrackers();
  } else if(tab === 'chat') {
    document.getElementById('c-chat').classList.add('active');
    document.getElementById('nav-chat').classList.add('active');
  }
}

// 初期化実行
initApp();
</script>
