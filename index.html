<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>安全产品出荷 - 完全連携版</title>
<style>
:root{--ali-red:#FD384F;--ali-black:#191919;--bg-gray:#F2F2F7;--cainiao-blue:#0052CC;--success:#2E7D32}
*{box-sizing:border-box;margin:0;padding:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;font-size:11px}
body{background:var(--bg-gray);color:var(--ali-black);max-width:420px;margin:0 auto;min-height:100vh;position:relative;border-left:1px solid #E0E0E0;border-right:1px solid #E0E0E0;box-shadow:0 0 20px rgba(0,0,0,0.05);padding-bottom:60px}

/* ヘッダー */
header{background:#FFF;padding:8px 12px;position:sticky;top:0;z-index:90;border-bottom:1px solid #EAEAEA}
.header-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px}
.logo{font-size:16px;font-weight:900;color:var(--ali-black)}
.logo span{color:var(--ali-red)}
.search-bar-wrap{display:flex;align-items:center;background:#F0F0F0;border-radius:20px;padding:4px 6px 4px 12px;border:2px solid var(--ali-black)}
.search-input{border:none;background:none;outline:none;flex:1;font-size:12px}

/* タブナビ */
.warehouse-tabs{display:flex;background:#FFF;border-bottom:1px solid #EAEAEA}
.wh-tab{flex:1;text-align:center;padding:10px;font-weight:bold;cursor:pointer;color:#666;border-bottom:3px solid transparent;font-size:12px}
.wh-tab.active{color:var(--ali-red);border-bottom-color:var(--ali-red);font-weight:900}

.container{padding:8px}
.tab-content{display:none}
.tab-content.active{display:block}

/* 商品カード */
.p-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.p-card{background:#FFF;border-radius:12px;overflow:hidden;padding:8px;border:1px solid #EAEAEA;display:flex;flex-direction:column;justify-content:space-between}
.img-box{background:#F4F4F4;height:100px;border-radius:8px;display:flex;justify-content:center;align-items:center;font-size:40px}
.opt-select{width:100%;padding:4px;font-size:10px;margin:4px 0;background:#F6F6F6;border:1px solid #E0E0E0;border-radius:6px}
.sale-price{color:var(--ali-red);font-weight:900;font-size:14px}

.btn-buy{background:linear-gradient(90deg,#FF8800,#FF3300);color:#FFF;border:none;border-radius:18px;padding:6px;cursor:pointer;font-weight:bold;font-size:11px;margin-top:4px;width:100%;text-align:center}
.btn-link{background:#E8F0FE;color:var(--cainiao-blue);border:1px solid #B3D1FF;border-radius:8px;padding:8px;text-align:center;font-weight:bold;text-decoration:none;display:block;margin-top:8px}

/* パネル */
.panel{background:#FFF;border-radius:12px;padding:12px;margin-top:8px;border:1px solid #EAEAEA}
.f-group{display:flex;flex-direction:column;gap:4px;margin-bottom:8px}
.f-group label{font-weight:bold;color:#444}
.f-group input, .f-group select{padding:8px;background:#F9F9F9;border:1px solid #DDD;border-radius:6px;outline:none}

/* 追跡カード */
.track-card{background:#FFF;border-radius:12px;padding:12px;margin-bottom:10px;border:1px solid #EAEAEA}
.track-card.cancelled{background:#FFF0F0;border-color:#FFCDD2}
.status-badge{background:#E8F5E9;color:var(--success);padding:4px 8px;border-radius:4px;font-weight:bold;display:inline-block;margin-top:4px}
.status-badge.wait{background:#FFF3E0;color:#E65100}
.status-badge.cancel{background:#FFEBEE;color:#C62828}

/* ボトムナビ */
.bottom-nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:420px;background:#FFF;border-top:1px solid #EAEAEA;display:flex;justify-content:space-around;padding:8px 0;z-index:100}
.nav-btn{background:none;border:none;color:#666;font-weight:bold;cursor:pointer;font-size:10px}
.nav-btn.active{color:var(--ali-red)}
</style>
</head>
<body>

<header>
<div class="header-top">
<div class="logo">安全产品<span>出荷</span></div>
</div>
<div class="search-bar-wrap">
<input type="text" id="search-box" class="search-input" placeholder="商品を検索..." oninput="renderProducts()">
</div>
</header>

<div class="warehouse-tabs">
<div id="tab-china" class="wh-tab active" onclick="switchWarehouse('CHINA')">🇨🇳 グローバル便 (中国製品)</div>
<div id="tab-japan" class="wh-tab" onclick="switchWarehouse('JAPAN')">🇯🇵 スピード便 (日本製品)</div>
</div>

<div class="container">
  <!-- ショップ画面 -->
  <div id="c-shop" class="tab-content active">
    <div id="p-grid" class="p-grid"></div>

    <div class="panel">
      <h4 style="font-weight:900;margin-bottom:8px;color:var(--ali-red)">🛒 カート・ご注文フォーム</h4>
      <div id="cart-list" style="margin-bottom:8px;line-height:1.4;color:#555">カートは空です。</div>
      <div style="font-weight:900;font-size:13px;border-top:1px solid #EEE;padding-top:4px;margin-bottom:8px;">
        合計金額: <span id="cart-total" style="color:var(--ali-red)">0円</span>
      </div>

      <form onsubmit="handleOrder(event)" style="display:flex;flex-direction:column;gap:6px">
        <div class="f-group">
          <label>お名前</label>
          <input type="text" id="cust-name" required placeholder="山田 太郎">
        </div>
        <div class="f-group">
          <label>メールアドレス</label>
          <input type="email" id="cust-email" required placeholder="example@mail.com">
        </div>
        <div class="f-group">
          <label>お届け先住所</label>
          <input type="text" id="cust-addr" required placeholder="東京都...">
        </div>
        <div class="f-group">
          <label>お支払い方法</label>
          <select id="cust-pay" required>
            <option value="現金書留">現金書留</option>
            <option value="PayPay">PayPay</option>
            <option value="PayPal">PayPal</option>
          </select>
        </div>
        <button type="submit" class="btn-buy" style="padding:10px;">注文を確定する</button>
      </form>
    </div>
  </div>

  <!-- 追跡画面 -->
  <div id="c-my" class="tab-content">
    <div id="track-list"></div>
  </div>
</div>

<div class="bottom-nav">
  <button id="nav-shop" class="nav-btn active" onclick="switchTab('shop')">🏠 ホーム</button>
  <button id="nav-my" class="nav-btn" onclick="switchTab('my')">📦 注文・追跡</button>
</div>

<script>
// スプレッドシートURL (商品データ)
const SHEET_PROD_URL = "https://docs.google.com/spreadsheets/d/1LK09yYcLi63EW9-xhXIENfszwyFLC4Jmz_-tO69ab94/export?format=csv&gid=0";
// 追跡管理用スプレッドシート (B欄:追跡コード, C欄:承認状態)
const SHEET_TRACK_URL = "https://docs.google.com/spreadsheets/d/1LK09yYcLi63EW9-xhXIENfszwyFLC4Jmz_-tO69ab94/export?format=csv&gid=0"; 

let products = { CHINA: [], JAPAN: [] }, cart = [], orders = [], currentWH = "CHINA";
const TRACK_BASE_URL = "https://sixyami1206-commitis.github.io/rabbitwj/";

if (localStorage.getItem('ali_orders_v2')) {
  try { orders = JSON.parse(localStorage.getItem('ali_orders_v2')); } catch(e) { orders = []; }
}

async function loadData() {
  try {
    const res = await fetch(SHEET_PROD_URL);
    const csv = await res.text();
    const rows = csv.split('\n').slice(1);
    products.CHINA = []; products.JAPAN = [];

    rows.forEach((row, idx) => {
      if (!row.trim()) return;
      const cols = row.split(',').map(c => c.replace(/^"(.*)"$/, '$1').trim());
      const wh = cols[0] ? cols[0].toUpperCase() : "CHINA";
      const opts = (cols[5] || "標準").split(/\r?\n/).map(o => o.trim()).filter(Boolean);

      products[wh].push({
        id: idx + 1, name: cols[1] || "製品アイテム", price: parseInt(cols[2]) || 0, icon: cols[4] || "📦", opt: opts
      });
    });

    renderProducts();
  } catch (err) {
    console.error("データ読み込みエラー", err);
  }
}

function switchWarehouse(wh){
  currentWH = wh;
  document.getElementById('tab-china').classList.toggle('active', wh==='CHINA');
  document.getElementById('tab-japan').classList.toggle('active', wh==='JAPAN');
  renderProducts();
}

function switchTab(t){
  document.querySelectorAll('.tab-content').forEach(e=>e.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(e=>e.classList.remove('active'));
  document.getElementById(`c-${t}`).classList.add('active');
  document.getElementById(`nav-${t}`).classList.add('active');
  if(t==='my') checkAndRenderTrackers();
}

function renderProducts(){
  let list = products[currentWH] || [];
  let kw = document.getElementById('search-box').value.trim().toLowerCase();
  if(kw) list = list.filter(p => p.name.toLowerCase().includes(kw));

  let grid = document.getElementById('p-grid');
  grid.innerHTML = list.map(p=>`
    <div class="p-card">
      <div class="img-box">${p.icon}</div>
      <div style="font-weight:bold;margin-top:4px;">${p.name}</div>
      <select id="opt-${p.id}" class="opt-select">${p.opt.map(o=>`<option value="${o}">${o}</option>`).join('')}</select>
      <div class="sale-price">${p.price}円</div>
      <button class="btn-buy" onclick="addToCart(${p.id})">カートに追加</button>
    </div>`).join('');
}

function addToCart(id){
  let p = products[currentWH].find(x=>x.id===id);
  let opt = document.getElementById(`opt-${id}`).value;
  cart.push({...p, chosenOpt: opt, origin: currentWH});
  updateCart();
}

function updateCart(){
  let el = document.getElementById('cart-list');
  if(!cart.length) { el.innerHTML = "カートは空です。"; document.getElementById('cart-total').innerText = "0円"; return; }

  el.innerHTML = cart.map((item, i) => `
    <div style="display:flex;justify-content:space-between;margin-bottom:4px;">
      <span>${item.icon} ${item.name} (${item.chosenOpt}) [${item.origin}]</span>
      <span><b>${item.price}円</b> <a href="#" onclick="cart.splice(${i},1);updateCart();return false;" style="color:var(--ali-red)">✕</a></span>
    </div>
  `).join('');

  let total = cart.reduce((s,i)=>s+i.price, 0);
  document.getElementById('cart-total').innerText = `${total}円`;
}

/* ==========================================================================
   📦 スプレッドシートB欄から空きコードを取得するロジック
   ========================================================================== */
async function fetchAvailableTrackCode(hasJapan, hasChina) {
  try {
    const res = await fetch(SHEET_TRACK_URL);
    const csv = await res.text();
    const rows = csv.split('\n').slice(1);

    // 接頭辞判定: 両方混ざるならCJ, 日本のみJP, 中国のみLP
    let prefix = "CJ";
    if (hasJapan && !hasChina) prefix = "JP";
    if (!hasJapan && hasChina) prefix = "LP";

    for (let row of rows) {
      let cols = row.split(',').map(c => c.replace(/^"(.*)"$/, '$1').trim());
      let bCode = cols[1]; // B欄
      
      // B欄が存在し、接頭辞が一致しており、使用中でない空きコードを探す
      if (bCode && bCode.startsWith(prefix)) {
        let isUsed = orders.some(o => o.trackCode === bCode && !o.isCancelled);
        if (!isUsed) {
          return bCode; // 空きコードを返す
        }
      }
    }
  } catch (e) {
    console.error("スプレッドシートからの追跡コード取得失敗", e);
  }
  return null; // 空きなし
}

/* ==========================================================================
   🛍️ 注文送信処理
   ========================================================================== */
async function handleOrder(e){
  e.preventDefault();
  if(!cart.length) { alert("カートに商品を追加してください。"); return; }

  let hasJapan = cart.some(i => i.origin === "JAPAN");
  let hasChina = cart.some(i => i.origin === "CHINA");

  // スプレッドシートB欄からコード取得
  let assignedCode = await fetchAvailableTrackCode(hasJapan, hasChina);

  let newOrder = {
    id: "ORD-" + Date.now(),
    date: new Date().getTime(),
    name: document.getElementById('cust-name').value,
    email: document.getElementById('cust-email').value,
    addr: document.getElementById('cust-addr').value,
    pay: document.getElementById('cust-pay').value,
    items: cart.map(c => `${c.name}(${c.chosenOpt})`).join(", "),
    total: document.getElementById('cart-total').innerText,
    trackCode: assignedCode, // 空きコードまたはnull
    isApproved: false,
    isCancelled: false
  };

  orders.push(newOrder);
  localStorage.setItem('ali_orders_v2', JSON.stringify(orders));

  cart = [];
  updateCart();
  alert("ご注文を受け付けました。追跡画面へ移動します。");
  switchTab('my');
}

/* ==========================================================================
   🔍 スプレッドシートC欄の注文承諾チェック＆追跡表示
   ========================================================================== */
async function checkAndRenderTrackers(){
  let container = document.getElementById('track-list');
  if(!orders.length){ container.innerHTML = `<div style="text-align:center;padding:40px;color:#999">注文履歴はありません。</div>`; return; }

  // スプレッドシートC欄をリアルタイム確認
  let cStatusMap = {};
  try {
    const res = await fetch(SHEET_TRACK_URL);
    const csv = await res.text();
    const rows = csv.split('\n').slice(1);
    rows.forEach(r => {
      let cols = r.split(',').map(c => c.replace(/^"(.*)"$/, '$1').trim());
      if(cols[1]) cStatusMap[cols[1]] = cols[2]; // B欄のコードをキーに、C欄の状態を取得
    });
  } catch(e){}

  const NOW = new Date().getTime();
  const TWO_DAYS_MS = 2 * 24 * 60 * 60 * 1000; // 2日間(48時間)

  container.innerHTML = orders.map(ord => {
    // 1. C欄の承諾確認
    if (ord.trackCode && cStatusMap[ord.trackCode]) {
      let cVal = cStatusMap[ord.trackCode].trim();
      if (cVal !== "" && cVal !== "未" && cVal !== "保留") {
        ord.isApproved = true;
      }
    }

    // 2. 2日間未承諾の場合は自動キャンセル判定
    if (!ord.isApproved && !ord.isCancelled && (NOW - ord.date > TWO_DAYS_MS)) {
      ord.isCancelled = true;
    }

    // --- 表示分け ---
    if (ord.isCancelled) {
      return `
        <div class="track-card cancelled">
          <div style="font-weight:bold;color:#C62828">🛑 注文自動キャンセル</div>
          <div style="color:#666;margin-top:4px;">注文から2日間「注文承諾」が出なかったため、システムにより自動キャンセルされました。</div>
          <div style="font-size:9px;color:#999;margin-top:4px;">注文品: ${ord.items}</div>
        </div>`;
    }

    // 空きコード（🈳）が無かった場合の表示
    if (!ord.trackCode) {
      return `
        <div class="track-card">
          <div style="font-weight:bold;color:var(--ali-red)">⚠️ 追跡番号割り当て待ち</div>
          <div style="margin:6px 0;font-weight:bold;color:#E65100">現在物流番号が満員ですので追跡番号に🈳がでるまでお待ちください。</div>
          <div class="status-badge wait">配達予定日：1週間から2週間</div>
          <div style="font-size:9px;color:#666;margin-top:6px;">注文品: ${ord.items} | 決済: ${ord.pay}</div>
        </div>`;
    }

    // 通常追跡（承諾前 / 承諾後）
    let statusHTML = "";
    if (ord.isApproved) {
      statusHTML = `
        <div class="status-badge">✅ 注文承諾済み</div>
        <div style="margin-top:6px;font-size:10px;color:#333;">
          配送業者：<b>安全送达</b><br>
          追跡番号：<b>${ord.trackCode}</b>
        </div>
        <a href="${TRACK_BASE_URL}" target="_blank" class="btn-link">🚚 配送業者「安全送达」で追跡する</a>
      `;
    } else {
      statusHTML = `
        <div class="status-badge wait">注文データ送信済み（承諾確認中）</div>
        <div style="margin-top:4px;color:#666;font-size:10px;">追跡コード: <b>${ord.trackCode}</b></div>
        <div style="color:#999;font-size:9px;margin-top:2px;">※2日以内に店舗で注文承諾されない場合は自動キャンセルとなります。</div>
      `;
    }

    return `
      <div class="track-card">
        <div style="font-weight:bold;font-size:12px;margin-bottom:4px;">📦 ご注文品: ${ord.items}</div>
        <div style="color:#555;margin-bottom:6px;">お支払い: ${ord.pay} (${ord.total})</div>
        ${statusHTML}
      </div>`;
  }).join('');

  localStorage.setItem('ali_orders_v2', JSON.stringify(orders));
}

loadData();
</script>
</body>
</html>
